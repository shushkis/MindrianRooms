var ROOM_DATA = /*ROOM_DATA_PLACEHOLDER*/{"roomName":"Data Room State","stage":"Validation","generatedDate":"2026-07-07","theme":"dark","sections":[{"id":"business-model","label":"Business Model","color":"#2D6B4A","entryCount":1,"summary":"Mullins 7 Domains -- HaMuzim","artifacts":[{"filename":"mullins-7-domains.md","title":"Mullins 7 Domains -- HaMuzim","content":"---\nframework: mullins-7-domains\ngenerated: 2026-07-01\nparticipants: Mordi Verzberger, Elli Eidelman, Larry\noverall_verdict: GO\nweakest_domain: 6\nweakest_domain_resolved: true\n---\n\n# Mullins 7 Domains -- HaMuzim\n\n## Well-Defined Problems\n\n**Big Market:**\nHow can we help land registration authorities reach a legally defensible verdict, under circumstances where historical evidence is fragmented across disconnected archives unlinked to geographic coordinates, in order to resolve the disputed parcels that today default to the state by procedural failure rather than by fact?\n\n**MVP:**\nHow can we help the state identify parcels where private ownership cannot be proven, under circumstances where 70% of West Bank land is unregistered and historical records are disconnected from geographic coordinates, in order to systematically establish state ownership over unregistered land?\n\n---\n\n## Verdict\n\n**GO** -- All 7 domains GREEN. No blockers. Ottoman document NLP gap identified and resolved in-session: existing OCR tooling + small fine-tuned LLM is an engineering task, not a research problem.\n\n---\n\n## Score Card\n\n| # | Domain | Score | Status | Evidence |\n|---|--------|-------|--------|----------|\n| 1 | Target Segment Benefits | 5/5 | GREEN | Pain is irreversible. Land worth millions vs. 20-50K NIS report. JTBD gap 8/10 -- among the highest possible. |\n| 2 | Market Attractiveness (Macro) | 4/5 | GREEN | 70% of West Bank parcels unregistered. Government mandate + hundreds of millions NIS budget. Adjacent verticals: energy, agriculture, fire, infrastructure -- same engine, different output. |\n| 3 | Industry Attractiveness | 4/5 | GREEN | Supplier power LOW (public data). Substitutes = doing nothing. Zero direct rivals in niche. High barrier to entry once assembled layer exists. |\n| 4 | Sustainable Advantage | 4/5 | GREEN | Assembled layer is the moat -- every case enriches all prior cases. Technical network effect, not strategic claim. Mordi is founder + first customer + distribution channel simultaneously. |\n| 5 | Mission & Risk | 4/5 | GREEN | Mordi: \"can't sleep because the problem keeps him up.\" Elli: owns the technical challenge. Clean role split. Legal/IP coverage on founding team is rare at this stage. |\n| 6 | Ability to Execute on CSFs | 4/5 | GREEN | ✓ Georeferencing/CV: Elli (11 years sensor fusion). ✓ Legal admissibility: Mordi. ✓ Gov procurement: Mordi (existing relationships). ✓ Ottoman OCR/NLP: existing models (Osmanlica.com 88-97% accuracy) + fine-tune small LLM -- engineering task, not research. |\n| 7 | Connectedness | 4/5 | GREEN | Upstream: Survey Institute + PalOpenMaps (public). Downstream: Mordi IS the buyer and channel. Across: ISA validated unprompted (\"missing textual layers on GIS\"). Regulators: Mordi knows the landscape from the inside. |\n\n---\n\n## Weakest Domain (Resolved)\n\n**Domain 6: Ability to Execute -- Ottoman Arabic OCR/NLP**\n\nInitially flagged as YELLOW. Resolved in-session:\n- Active research community with dedicated Ottoman Turkish OCR models\n- Osmanlica.com: 88-97% character accuracy on Ottoman script\n- LLMs (including Claude) tested for OCR error correction on Ottoman text: 1.16% character error rate\n- Elli's approach: existing OCR as base + small fine-tuned LLM for correction and structuring\n- Assessment: standard engineering task with known tooling, not a research gap\n\nUpgraded to 4/5 GREEN.\n\n---\n\n## Competitive Watch -- Orhitec (checked 2026-07-07)\n\nFlagged by Mordi: found a product from Orhitec GIS Ltd (Israel, founded 1999, ~140 government/municipal clients) that \"does similar things.\"\n\n**Checked against Domains 3, 4, 7:**\n- Product scope: real-time land registry, building permits, property tax, land-use enforcement -- current administrative GIS/ERP for local authorities. No historical aerial imagery, no georeferencing of archival photos, no legal-admissibility evidence chain.\n- Searched specifically for ties to Israel Land Authority (רשות/מנהל מקרקעי ישראל), the Custodian of Government Property (ממונה על הרכוש הממשלתי), Ottoman-era records, and unregistered-land/cadastre work -- no documented connection found.\n- **Domain 3 (Industry Attractiveness) and Domain 4 (Sustainable Advantage): unchanged.** Orhitec is not in the historical-evidence/disputed-ownership niche; \"zero direct rivals\" stands.\n- **Domain 7 (Connectedness): watch item, not a downgrade.** Orhitec already sits inside the government/municipal procurement relationships this venture needs to break into (27 years of institutional trust). Not a capability threat today -- a distribution-speed risk if they ever extend from \"manage current records\" to \"reconstruct historical ones.\" Track for re-check if they move toward archival/cadastral or ILA-adjacent products.\n\n---\n\n## Strongest Domain\n\n**Domain 1: Target Segment Benefits -- 5/5**\n\nThe pain is irreversible and the economics are clear. When a parcel defaults to the state, the private claimant loses everything permanently. A system that changes that outcome -- even probabilistically -- has a near-unlimited willingness-to-pay ceiling relative to its cost. No other domain in this analysis has this property.\n\n---\n\n## Buyer Segments\n\n| Buyer | Motivation | Path | Stage |\n|-------|------------|------|-------|\n| ממונה רכוש ממשלתי | Identify unregistered land → establish state ownership | B2G | **MVP** |\n| סגן רמ\"א (Deputy Head, ILA) | Operational efficiency, fewer appeals | B2G | MVP / Scale |\n| Private claimant / developer | Prove ownership and win registration | B2B via law firms | Big Market expansion |\n\n**Corrected sequence:** State is the primary MVP customer. Private claimant segment addressed in the big market expansion phase.\n\n---\n\n## Recommendations\n\n1. **Move immediately to Biti Hills PoC.** Public data only. Reconstruct the missing cultivation evidence retroactively. If the public layer answers what the court couldn't answer -- that is the demo, the pitch, and the proof simultaneously.\n\n2. **MVP customer: the state (ממונה על הרכוש הממשלתי).** The system scans unregistered parcels, finds land with no provable private owner, and surfaces it for state registration. Mordi has the working relationship. PoC triggers the conversation.\n\n3. **Ottoman NLP: don't build from scratch.** Evaluate Osmanlica.com and TrOCR-based models as base. Fine-tune on a small labeled corpus of Jordanian-era property tax records (נסחי מס רכוש). This is a 2-3 month engineering sprint, not a research program.\n\n4. **Big market expansion: private claimants.** Once the state-side product is proven, address the inverse use case -- helping private parties prove ownership. Same engine, opposite query direction. This is the larger long-term market.\n\n---\n\n## Sources\n\n- Ottoman Turkish OCR: [Osmanlica.com deep learning model](https://www.researchgate.net/publication/376091048_A_Deep_Learning_Based_Offline_Optical_Character_Recognition_Model_for_Printed_Ottoman_Turkish)\n- LLM + Ottoman text: [Medium -- Can LLMs help with Ottoman Text Recognition?](https://medium.com/@kavaniniosmaniyye/2024-can-llms-help-with-ottoman-text-recognition-and-latinization-39e6d705d849)\n- Automatic transcription: [Springer -- Automatic Transcription of Ottoman Documents](https://link.springer.com/chapter/10.1007/978-3-031-70442-0_26)\n","excerpt":"## Well-Defined Problems **Big Market:** How can we help land registration authorities reach a legally defensible verdict, under circumstances where historical evidence is fragmented across...","date":"2026-07-07"}]},{"id":"competitive-analysis","label":"Competitive Analysis","color":"#B5602A","entryCount":1,"summary":"Competitive Landscape -- Geospatial Intelligence Platform","artifacts":[{"filename":"competitive-landscape.md","title":"Competitive Landscape -- Geospatial Intelligence Platform","content":"---\r\nsource: larry-analysis\r\ndate: 2026-06-24\r\nbased-on: mordi-verdict, yonatan-meeting, jtbd-analysis\r\n---\r\n\r\n# Competitive Landscape -- Geospatial Intelligence Platform\r\n\r\n## What You Actually Replace (Wedge: Legal Disputes)\r\n\r\n### Option 3 confirmed: Mordi does it himself in ArcGIS\r\nCurrent workflow:\r\n- Manual georeferencing of scanned historical photos using ground control points\r\n- Hours per image, error-prone, subjective interpretation\r\n- Output is challengeable in court because it is expert opinion, not provenance chain\r\n\r\nYou replace: Mordi's manual labor + the risk of subjective interpretation\r\nYou keep: Mordi as domain expert and first customer\r\n\r\n## The Four Competitive Realities\r\n\r\n### 1. No spatial evidence used at all (most common)\r\nThe Biti Hills verdict is the proof: the applicant had witnesses, testimony,\r\nan expert document examiner -- and no temporal aerial evidence.\r\nThey could not prove 10 years of continuous cultivation.\r\nThe committee said: we can see olive trees. We cannot determine who tended them when.\r\n\r\nTHIS IS YOUR PRIMARY COMPETITION: doing nothing.\r\nYou are not replacing a tool. You are creating a category of evidence.\r\n\r\n### 2. GIS Contractors (price + turnaround competition)\r\nExist for large infrastructure projects.\r\nNot accessible for single land dispute cases -- too expensive, too slow.\r\nDo not specialize in historical multi-source fusion.\r\nDo not produce legal provenance chains.\r\n\r\n### 3. Licensed Surveyors (credential competition)\r\nHold legal standing for cadastral surveys.\r\nCannot analyze historical aerial imagery at scale.\r\nYou arm them, you do not replace them.\r\nPotential channel partner, not competitor.\r\n\r\n### 4. Enterprise GIS Platforms (Esri ArcGIS, Bentley, etc.)\r\nTools, not solutions. Require expert operators.\r\nDo not fuse heterogeneous historical sources automatically.\r\nDo not produce provenance-traced legal exhibits.\r\nMordi uses ArcGIS today -- it is what you replace at the workflow layer.\r\n\r\n## Platform Competitive Landscape (Future)\r\n\r\n### Agriculture / Change Detection\r\n- Planet Labs (satellite imagery subscription)\r\n- Climate Corp / Bayer (precision ag)\r\n- EOS Crop Monitoring\r\nThese are data providers. You are a fusion + inference layer.\r\nThey could be inputs to your system, not competitors.\r\n\r\n### Infrastructure / Utility GIS\r\n- Esri ArcGIS Utility Network\r\n- Bentley OpenUtilities\r\n- Various national cadastre systems\r\nThese solve the present. None solve the historical reconstruction problem.\r\n70% of West Bank land parcels are not registered anywhere.\r\nSame pattern in most developing nations.\r\n\r\n### OSINT / Intelligence Platforms\r\n- Palantir (defense, not commercial)\r\n- Maxar (satellite, not fusion)\r\n- Synthesio / Brandwatch (social OSINT, not spatial)\r\nNo direct competitor in spatial-temporal open-source fusion for civilian use.\r\n\r\n## Your Moat\r\n\r\nNot the algorithm. Esri can build the algorithm.\r\nNot the data. Planet can sell the data.\r\n\r\nThe moat is the ASSEMBLED LAYER:\r\n- Historical aerial photos georeferenced and indexed\r\n- Court decisions parsed and spatially tagged\r\n- Ottoman-era land records digitized and fused\r\n- Testimony corroborated with spatial coordinates\r\n- Provenance chain from 1959 document to 2024 satellite image\r\n\r\nOnce assembled, this layer has compounding value.\r\nEach new case adds evidence. Each new source strengthens every other case.\r\nNetwork effect: the base layer becomes more valuable with every dispute resolved.\r\n\r\n## First Check\r\n\r\nWho writes the first check?\r\n- Mordi's firm: internal efficiency gain (hours saved per case)\r\n- Mordi's network: other land dispute lawyers in Israel (referral)\r\n- Israel Land Authority / Civil Administration: regulatory use case\r\n- Survey Institute partnership: data exchange, not cash (deferred)\r\n\r\nFastest path to revenue: law firms handling land disputes in Judea and Samaria.\r\nMordi has the network. He IS the channel.\r\n\r\n## The Yonatan Insight on Liability\r\n\r\nIFF has a liability problem: system kills wrong person, who is responsible?\r\nGeospatial exhibits do NOT have this problem.\r\nThe system does not decide ownership. It produces evidence.\r\nThe judge decides. The lawyer decides. The system provides the provenance chain.\r\nLiability stays with the human decision-maker.\r\nThis is why the descriptive (not generative) architecture was the right call.\r\n","excerpt":"--- source: larry-analysis date: 2026-06-24 based-on: mordi-verdict, yonatan-meeting, jtbd-analysis --- ## What You Actually Replace (Wedge: Legal Disputes) ### Option 3 confirmed: Mordi does it...","date":"2026-07-01"}]},{"id":"financial-model","label":"Financial Model","color":"#2A6B5E","entryCount":0,"summary":"","artifacts":[]},{"id":"legal-ip","label":"Legal Ip","color":"#6B4E8B","entryCount":0,"summary":"","artifacts":[]},{"id":"market-analysis","label":"Market Analysis","color":"#C8A43C","entryCount":2,"summary":"Buyer Analysis -- Three-Segment Map","artifacts":[{"filename":"buyer-analysis.md","title":"Buyer Analysis -- Three-Segment Map","content":"---\nsource: larry-session\ndate: 2026-07-01\nsection: market-analysis\nparticipants: Mordi Verzberger, Larry\n---\n\n# Buyer Analysis -- Three-Segment Map\n\n## Session Summary\n\nThree distinct buyer segments identified with confirmed budget authority and motivation.\nEach has a different procurement path and willingness-to-pay logic.\n\n---\n\n## Buyer 1: סגן רמ\"א (Deputy Head, Israel Land Authority)\n\n**Role:** Responsible for the entire budget of the מנהל האזרחי (Civil Administration)\n\n**Motivation:** Operational efficiency\n- Reduce dispute resolution time\n- Reduce appeals caused by insufficient spatial evidence\n- Faster land registration (הסדרה) at scale\n\n**Procurement path:** B2G -- formal process, slow\n**Relationship status:** Mordi has direct working relationship. Will approach once a serious demo exists.\n**Pitch logic:** \"Here is what unresolved disputes cost you operationally. Here is what changes.\"\n\n---\n\n## Buyer 2: ממונה על הרכוש הממשלתי (Government Property Custodian)\n\n**Role:** Representative of רמ\"י in יהודה ושומרון\n\n**Motivation:** Asset identification -- every unproved private claim defaults to state ownership (Israeli law)\n- Direct financial incentive: more land resolved = more state assets confirmed\n- More aggressive motivation than Buyer 1\n\n**Procurement path:** B2G -- formal process, slow\n**Neutrality question (resolved):** System is descriptive, not generative. Presents evidence, does not decide outcomes. Buyer cannot cause the system to suppress contrary evidence. Neutrality is preserved by architecture.\n**Pitch logic:** \"Every unregistered parcel is a potential state asset. This finds the evidence.\"\n\n---\n\n## Buyer 3: היזם / הצד הפרטי (Private Developer / Land Claimant)\n\n**Role:** Party claiming rights to a disputed parcel (Biti Hills archetype)\n\n**Motivation:** Win the case\n- Biti Hills lost -- not because the truth was absent, but because the evidence was not found\n- Land value: several million NIS per typical parcel\n- A 20,000-50,000 NIS report that changes the outcome is not an expense -- it is the cheapest bet available\n\n**Procurement path:** B2B via law firms -- no procurement process\n**Stage:** Big Market expansion (not MVP)\n**Pitch logic:** \"You paid the lawyer, the surveyor, the architect. You haven't paid the one person who can prove the land is yours.\"\n\n---\n\n## Comparative Table\n\n| Buyer | Motivation | Procurement | Stage | Pitch Anchor |\n|-------|------------|-------------|-------|--------------|\n| ממונה רכוש ממשלתי | Identify unregistered land → state ownership | B2G | **MVP** | Every unregistered parcel is a potential state asset |\n| סגן רמ\"א | Operational efficiency, fewer appeals | B2G | MVP / Scale | Reduce unresolved caseload |\n| יזם / צד פרטי | Prove ownership, win registration | B2B via law firms | Big Market expansion | ROI on case value |\n\n**Corrected sequence (2026-07-01):** State is the primary MVP customer. Private claimant is the big market expansion -- same engine, opposite query direction.\n\n---\n\n## Economics (Private Claimant Segment)\n\n- Typical parcel value in Biti Hills area: several million NIS\n- Willingness to pay: 1-2% of asset value = 20,000-50,000 NIS per case report\n- Reference: claimant already pays lawyers, surveyors, expert witnesses\n- Biti Hills outcome: lost because temporal aerial evidence of continuous cultivation was unavailable -- exactly what HaMuzim produces\n\n---\n\n## Biti Hills as Case Study (Confirmed)\n\nMordi confirmed Biti Hills is the ideal case study. Decisions to be filed when received.\n\nWhy it works as a demo:\n- Case is public record\n- Failure mode is known and specific: could not prove 10 years of continuous cultivation\n- Public aerial data layer may be sufficient to reconstruct the missing evidence retroactively\n- If the public layer answers what the court could not answer -- that IS the demo\n\nPlanned use:\n1. Technical PoC: reconstruct missing evidence using public data only\n2. Pitch to סגן רמ\"א: \"Here is a case your system closed with the wrong outcome. Here is what was missing.\"\n3. Pitch to private claimants: \"Here is what losing a case looks like when the evidence existed but was not found.\"\n\n---\n\n## Open Items\n\n- [ ] Biti Hills court decisions to be filed (Mordi to send)\n- [ ] Size the total addressable volume: how many cases per year come before committees like Mordi's, across all of Judea and Samaria?\n- [ ] Define MVP scope: what is the minimum output that gets סגן רמ\"א into a serious conversation?\n- [ ] Pricing model for private claimant segment (per-case vs. subscription for law firms)\n","excerpt":"## Session Summary Three distinct buyer segments identified with confirmed budget authority and motivation. Each has a different procurement path and willingness-to-pay logic. --- ## Buyer 1: סגן...","date":"2026-07-01"},{"filename":"jtbd-analysis.md","title":"Jobs To Be Done -- Geospatial Legal Intelligence","content":"---\r\nmethodology: analyze-needs\r\ncreated: 2026-06-24\r\ndepth: quick\r\nproblem_type: ill-defined -> well-defined\r\nventure_stage: Pre-Opportunity\r\nroom_section: market-analysis\r\n---\r\n\r\n# Jobs To Be Done -- Geospatial Legal Intelligence\r\n\r\n## Customer\r\n\r\nMordi. Chairman of a juridical committee adjudicating land disputes. On a Tuesday he has two parties in front of him, each holding documents claiming ownership of the same parcel. He needs to evaluate both sets of competing evidence against an independent spatial baseline -- and produce a verdict with precisely determined boundaries.\r\n\r\nHe is not an advocate. He is an adjudicator. His credibility depends on ruling accurately, not winning.\r\n\r\n## Job Statement\r\n\r\nWhen two parties present competing ownership claims over a piece of land with disputed or vanished historical markers, I want to evaluate both claims against an independent historical spatial record with full provenance, so I can issue a legally defensible verdict with precisely mapped boundaries that the Israel Survey Authority can authorize.\r\n\r\n## Job Steps\r\n\r\n| Step | Description | Importance (1-10) | Satisfaction (1-10) | Gap |\r\n|------|-------------|-------------------|---------------------|-----|\r\n| Define | Understand the dispute: which boundary, which historical period, what claims | 8 | 6 | 2 |\r\n| Locate | Find the right historical aerial photos, cadastral records, legal docs for that era | 9 | 3 | **6** |\r\n| Prepare | Digitize, georeference, calibrate old imagery against current orthophotos | 9 | 2 | **7** |\r\n| Execute | Compare historical vs. current -- identify vanished markers, reconstruct boundary | 10 | 2 | **8** |\r\n| Monitor | Cross-check against legal standards, opposing evidence, client claims | 8 | 4 | 4 |\r\n| Modify | Adjust interpretation under challenge or new evidence from opposing counsel | 7 | 5 | 2 |\r\n| Conclude | Produce legally admissible expert report with full provenance chain | 9 | 5 | 4 |\r\n\r\n## Blocked Steps\r\n\r\n| Step | Blocker Type | Specific Moment | Current Workaround |\r\n|------|-------------|-----------------|-------------------|\r\n| Locate | Functional | Knowing which archive holds the right vintage photo for a specific parcel | Manual archive search, phone calls, depends on personal contacts |\r\n| Prepare | Functional + Emotional | Georeferencing scanned historical imagery by hand using ground control points | Manual GCP placement in GIS software -- hours per image, error-prone |\r\n| Execute | Functional + Social | Comparing features that no longer exist (vanished trees, moved fences) across time periods | Side-by-side manual inspection; interpretation is subjective and challengeable |\r\n\r\n## Opportunity Clusters\r\n\r\n| Cluster | Blocked Steps | Job Dimensions | Size Estimate |\r\n|---------|--------------|----------------|---------------|\r\n| Historical evidence pipeline | Locate + Prepare | Functional: can't get usable spatial data fast enough | Every land lawyer handling historical disputes; UXO mapping; infrastructure inspection |\r\n| Boundary reconstruction engine | Execute | Functional + Social: output must be admissible, not just accurate | Legal market wedge; agricultural change detection; insurance claims |\r\n| Provenance chain generator | Conclude | Social: the chain of custody IS the product | Any domain where spatial evidence enters adversarial proceedings |\r\n\r\n## Key Architecture Decision (Filed)\r\n\r\nThe system is DESCRIPTIVE, not GENERATIVE.\r\n- Current imagery = ground truth\r\n- Historical evidence = annotation overlays on current imagery\r\n- Each annotation tagged to: source document + date + methodology + confidence\r\n- Generative synthesis explicitly rejected: a synthesized boundary image becomes expert opinion subject to cross-examination; an annotated provenance chain is an exhibit\r\n\r\n## Pre-Decision Value (Identified)\r\n\r\nThe system answers Mordi's earlier question: should we take this case at all?\r\nFast, low-cost historical evidence scan as case intake filter -- distinct commercial value\r\nbefore full dispute support is needed.\r\n\r\n## Legal Default -- State Ownership (Critical Commercial Fact)\r\n\r\nIsraeli law: if ownership cannot be proved, the land defaults to the state.\r\nImplication: the government is the largest single beneficiary of unresolved or unprovable claims.\r\nThe Israel Survey Authority has direct financial and institutional interest in accurate, fast dispute resolution.\r\n\r\n## Customer Stack (Updated)\r\n\r\n| Customer | Role | Relationship to System |\r\n|----------|------|------------------------|\r\n| Mordi's committee | Proof of concept user | Validates system works; first use case |\r\n| Israel Survey Authority | Institutional buyer | Produces authorized maps post-verdict; already identified as potential customer by Mordi; government scale |\r\n| Road planners, infrastructure authorities | Platform expansion | Query land ownership corpus once built; do not require legal verdict workflow |\r\n\r\n## Workflow Position\r\n\r\nMordi's committee rules → Israel Survey Authority draws the authorized map → map becomes legal record.\r\nThis system sits UPSTREAM of ISA's entire map production process.\r\nISA is not a competitor. They are the body that formalizes what this system produces.\r\n\r\n## Homework\r\n\r\nTalk to the ISA contact Mordi interviewed. Three questions:\r\n1. What does their current process look like when a verdict arrives without adequate spatial evidence?\r\n2. What does it cost them (time, money, appeals) when a boundary determination gets challenged?\r\n3. Would they pay for better pre-verdict spatial intelligence, or does that have to come through the committee?\r\n","excerpt":"--- methodology: analyze-needs created: 2026-06-24 depth: quick problem_type: ill-defined -> well-defined venture_stage: Pre-Opportunity room_section: market-analysis --- ## Customer Mordi. Chairman...","date":"2026-07-01"}]},{"id":"problem-definition","label":"Problem Definition","color":"#A63D2F","entryCount":3,"summary":"The Evidence Gap in Geospatial Dispute Resolution","artifacts":[{"filename":"initial-exploration.md","title":"The Evidence Gap in Geospatial Dispute Resolution","content":"---\r\nsource: new-project exploration\r\ndate: 2026-06-22\r\n---\r\n\r\n# The Evidence Gap in Geospatial Dispute Resolution\r\n\r\nThe core problem: historical aerial photos and maps are not spatial data until georeferenced. Mordi (co-founder, land dispute lawyer) currently does this process by hand -- registering scanned historical imagery to present-day orthophotos using ground control points, correcting for terrain and camera tilt.\r\n\r\n## Why the Problem Is Hard\r\n\r\n- Pre-alignment search space is larger than modern image registration because features have changed over time\r\n- Sources are heterogeneous: aerial photos, cadastral records, satellite imagery, testimony -- wildly different types and quality\r\n- Joint registration across multiple years is more robust than one-at-a-time (documented in WWII UXO mapping workflows)\r\n\r\n## The Pre-Decision Value\r\n\r\nMordi's colleagues confirmed: the system doesn't just speed up the dispute decision -- it answers the earlier question of whether to take the case at all. A fast, low-cost historical evidence scan as a case intake filter has distinct commercial value separate from full dispute support.\r\n\r\n## Epistemic Architecture (Critical Design Decision)\r\n\r\nTwo paths for the output layer:\r\n- **Descriptive (chosen):** current imagery as ground truth, historical evidence as annotation overlays. Each annotation traces to a source with documented methodology.\r\n- **Generative/normative (rejected):** synthesize a new image of \"how it should look.\" Rejected because generative hallucinations in legal contexts undermine trust and admissibility; synthesized images become expert opinion requiring cross-examination rather than auditable exhibits.\r\n\r\nThe descriptive path produces a provenance chain -- every annotation is traceable to its source. That chain is what makes output an exhibit, not an interpretation.\r\n","excerpt":"--- source: new-project exploration date: 2026-06-22 --- The core problem: historical aerial photos and maps are not spatial data until georeferenced. Mordi (co-founder, land dispute lawyer)...","date":"2026-07-01"},{"filename":"legal-workflow-analysis.md","title":"Legal Proceeding Workflow -- Full Map","content":"---\nsource: larry-session\ndate: 2026-07-01\nsection: problem-definition\nparticipants: Mordi Verzberger, Larry\n---\n\n# Legal Proceeding Workflow -- Full Map\n\n## The Proceeding Structure\n\nA land registration proceeding before the committee involves four stages:\n\n1. **תצהירים** -- Affidavits submitted by all parties with supporting documents\n2. **דיון הוכחות** -- Evidence hearing: cross-examination of affiants + expert witnesses\n3. **עדים מומחים** -- Two expert types:\n   - כתבי יד ואותנטיות -- Handwriting and document authenticity experts\n   - מומחים לפיענוח תצ\"א -- Aerial photo interpretation experts (testify on cultivation extent over time)\n4. **סיכומים** -- Final summations\n5. **החלטה** -- Decision based on all collected material\n\n---\n\n## The Three Legal Questions (Framework for HaMuzim)\n\nThe committee must rule on three distinct questions. Each maps to a product module.\n\n---\n\n### Question 1: רכישה -- Legal Acquisition (Module 1)\n\n**The question:** Does the applicant present a lawful basis for holding the land under equity law?\n\n**Standard of proof:**\n- Jordan-era property tax record (נסח מס רכוש) showing historical holder in the 1950s-60s\n- Chain of title from that holder to the current applicant:\n  - Purchase agreements (הסכמי מכר)\n  - Powers of attorney (יפויי כח)\n  - Inheritance orders (צווי ירושה)\n\n**Common failure modes:**\n- Long, complex chains with multiple heirs (ריבוי יורשים)\n- Double sale claims (מכירה כפולה) -- same parcel sold twice by same seller\n- Missing links in the documentary chain\n\n**This is the most frequent failure point.** A significant percentage of cases collapse here.\n\n**HaMuzim Module 1:**\n- OCR and parse Ottoman/Jordanian-era documents automatically\n- Build visual chain-of-title graph: who held, when, what transferred the right\n- Detect contradictions automatically (double sale = same seller, same parcel, two transactions)\n- Output: structured timeline replacing a pile of documents\n\n---\n\n### Question 2: מיקום -- Physical Location (Module 2)\n\n**The question:** Where exactly is this parcel in space, and does it match what the tax record describes?\n\n**Standard of proof:**\n- The property tax record cites a מווקע -- a large area containing many parcels (gives general orientation)\n- Applicant must prove the specific parcel with its claimed boundaries corresponds to the מווקע entry\n- Evidence used:\n  - Neighbor testimonies\n  - Mukhtar certificates (תעודות מוכתאר)\n  - Historical maps\n  - Field inspection and boundary survey (הליך כשף)\n\n**Common failure modes:**\n- Cannot coherently locate the parcel boundaries in space\n- Mismatch between the מווקע description and the claimed physical location\n\n**HaMuzim Module 2:**\n- Convert מווקע name + textual boundary descriptions → coordinates (Text → Geo)\n- Cross-reference historical maps with current orthophotos\n- Neighbor testimony corroborated against spatial evidence\n- This is the exact bidirectional Text↔Geo bridge already in the architecture\n\n---\n\n### Question 3: עיבוד וחזקה -- Cultivation and Possession (Module 3)\n\n**The question:** Has the applicant cultivated and possessed the land for 10 continuous years?\n(Required under Section 78, Ottoman Land Law)\n\n**Standard of proof:**\n- Aerial photo interpretation expert (מומחה לפיענוח תצ\"א)\n- Testifies on cultivation evidence visible in historical aerial photography\n- Field visits, witness testimony on possession\n\n**Common failure modes:**\n- Cannot produce temporal aerial evidence of continuous cultivation\n- Expert opinion is challengeable under cross-examination (subjective interpretation)\n- Biti Hills: applicant had witnesses, document expert, and testimony -- but could not prove 10 years of continuous cultivation. Lost.\n\n**HaMuzim Module 3:**\n- Automated aerial photo time series: 1959 → 1967 → 1972 → 1984 → ... → 2024\n- Cultivation detection per year with confidence scoring\n- Replaces expert opinion with provenance-traced evidence\n- Expert opinion = challengeable. Provenance-traced observation = exhibit.\n\n---\n\n## The Integration Insight\n\nThe three modules are not independent. The most powerful use case is cross-module resolution:\n\n**Double sale scenario:** Module 1 detects contradiction (same seller, two buyers).\nModule 3 resolves it: who was actually on the land? Who cultivated? Who built the fence?\nGeography adjudicates what the documents cannot.\n\n**The product does not solve three separate questions.\nIt resolves the contradictions BETWEEN the questions.**\n\n---\n\n## The Market Insight\n\n**\"A significant percentage of cases ends without registration due to evidentiary difficulties.\"**\n\nThis is not inefficiency. It is a permanent, irreversible outcome:\n- Without registration → land defaults to state ownership\n- Private claimant loses everything, even if the underlying claim is legitimate\n\nHaMuzim does not make the process faster.\n**It changes outcomes.** Cases that today end in \"no registration\" may end differently.\n\n---\n\n## Product Physical Description\n\n**One screen. Three zones.**\n\n**Left -- Evidence Timeline:**\nSelected parcel. System displays available sources by year:\n1959 ✓ / 1967 ✓ / 1972 ✓ / 1984 ✓ / 2003 ✓ / 2024 ✓\nEach year: source, confidence level, detected features.\n\n**Center -- Map:**\nCurrent satellite/orthophoto as ground truth.\nHistorical evidence as overlay layers: vanished fences, olive trees, structures, cultivation marks.\nEach layer tagged to year and source.\n\n**Right -- Observation List:**\n\"1967, aerial survey from Survey Institute archive -- olive trees visible in northern three-quarters. Confidence: high.\"\n\"1984, Landsat satellite -- active cultivation marks. Confidence: medium.\"\n\n**Output -- Legal Exhibit:**\nOne click → PDF with full timeline, all sources, all findings, complete provenance chain.\nReady for court submission.\n\n---\n\n## Open Items\n\n- [ ] Biti Hills court decisions to be filed (Mordi to send)\n- [ ] Quantify: how many cases per year end without registration across all committees in Judea and Samaria?\n- [ ] Define MVP scope: which module is the entry point for the first demo?\n- [ ] Pricing model for private claimant segment\n- [ ] MVP pitch to סגן רמ\"א: defined next session\n","excerpt":"## The Proceeding Structure A land registration proceeding before the committee involves four stages: 1. **תצהירים** -- Affidavits submitted by all parties with supporting documents 2. **דיון...","date":"2026-07-01"},{"filename":"yonatan-sagir-meeting.md","title":"Meeting: Yonatan Sagir -- IRIS Program Debrief","content":"---\r\nsource: meeting-transcript\r\ndate: 2026-06-24\r\nparticipants: Elli Eidelman, Mordi Verzberger, Yonatan Sagir (IRIS program lead)\r\nfiled-by: larry\r\n---\r\n\r\n# Meeting: Yonatan Sagir -- IRIS Program Debrief\r\n\r\n## What Was Validated\r\n\r\nYonatan confirmed the geospatial path over IFF. His reasoning:\r\n- IFF has unsolved liability problem: who is responsible when the system kills the wrong person?\r\n- Geospatial platform has dual-use by definition -- not locked inside defense procurement\r\n- Business potential is not bounded by a single ministry budget\r\n\r\n## Key Reframes From Yonatan\r\n\r\n### The Breezometer Moment\r\nBreezometer built an air quality sensor. The sensor was the entry point.\r\nThe data layer they accumulated became the real product.\r\nSame structure here: legal disputes are the receptor.\r\nThe historical spatial intelligence layer is the product.\r\n\r\n### The Temporal Arc\r\nPast -> Present: reconstruct historical evidence (Mordi's current job)\r\nPresent -> Future: predict what will happen to this land\r\n  - Fire risk (soil dryness trends)\r\n  - Agricultural potential (sun exposure, soil composition)\r\n  - Pipeline routing (where infrastructure runs underground)\r\n  - Development potential (zoning, density, access)\r\nThe engine is identical. Output packaging changes per buyer.\r\n\r\n### Open Data as Strategic Foundation\r\nBuild the base layer from public sources only:\r\n  - Public orthophotos (Israel Survey Institute archives)\r\n  - Historical aerial photography (public domain)\r\n  - Court decisions and land records (public filings)\r\n  - OSINT (drone footage, satellite imagery, social media geo-tagged content)\r\n\r\nWhen government agencies and utilities want insight, they add private data\r\non top of your base layer. You become infrastructure they plug into.\r\n\"You're the socket. They're the plug.\"\r\n\r\n### Infrastructure, Not Solution\r\nYonatan pushed hard on this: do not position as a product for one use case.\r\n\"Instead of being a solution to a problem, be a platform of infrastructure\r\nfor many different solutions.\"\r\nTactical entry: Mordi's legal disputes.\r\nStrategic goal: the base layer that any spatial-temporal decision maker needs.\r\n\r\n## Team Clarity\r\n\r\nElli: loves the technical challenge of building it. No deep passion for land law.\r\nMordi: can't sleep because the problem keeps him up. Domain expert, legal network, first customer.\r\nYonatan's framing: \"Leave the passion for the problem to Mordi. Stay in love with the solutions, Elli.\"\r\nStructure: Mordi = business/domain. Elli = CTO/product.\r\n\r\n## The Domain Name\r\n\r\nYonatan corrected \"real estate\" as the domain.\r\n\"Real estate is a use case. The domain is geospatial intelligence --\r\nthe ability to draw conclusions from open information about a geographic\r\narea for purpose X.\"\r\nMordi's summary: \"Data Geography.\"\r\n\r\n## The Proof of Concept Yonatan Named\r\n\r\n\"What we're doing with Larry right now is essentially what you want to\r\ndo with land data -- aggregate multi-source information and draw\r\nconclusions from it. We just proved it's possible.\"\r\n\r\n## Yonatan's Market Signal\r\n\r\nHe mentioned he works with people who have deep interest in:\r\n- Energy (where to route pipelines)\r\n- Geography and land use\r\n- Fire management (California fires -- aggregate drone footage in real time)\r\nActive demand exists. Not hypothetical.\r\n\r\n## Open Questions Raised\r\n\r\n1. What is the minimum viable base layer that produces value before private data is added?\r\n2. Which persona is the first paying customer: lawyer, surveyor, government authority, utility?\r\n3. Can the open-data layer alone sustain a product, or does it require partnership with data owners?\r\n4. Where does Israel Survey Institute data end and private data begin?\r\n\r\n## Where They Stopped\r\n\r\nYonatan told them to file this meeting to Larry and start fresh with\r\na new room focused on geospatial intelligence (data geography).\r\nThey confirmed the geospatial path as primary.\r\nIFF parked -- not abandoned, not active.\r\n","excerpt":"--- source: meeting-transcript date: 2026-06-24 participants: Elli Eidelman, Mordi Verzberger, Yonatan Sagir (IRIS program lead) filed-by: larry --- ## What Was Validated Yonatan confirmed the...","date":"2026-07-01"}]},{"id":"solution-design","label":"Solution Design","color":"#5C5A56","entryCount":2,"summary":"Data Source Inventory -- MVP Layer Map","artifacts":[{"filename":"data-inventory.md","title":"Data Source Inventory -- MVP Layer Map","content":"---\r\nsource: larry-session\r\ndate: 2026-06-30\r\nsection: solution-design\r\n---\r\n\r\n# Data Source Inventory -- MVP Layer Map\r\n\r\n## Public Layer (Build Now, No Permission Required)\r\n\r\n| Source | Type | Coverage | Notes |\r\n|--------|------|----------|-------|\r\n| Israeli Survey Institute | Aerial / orthophoto | Historical + current | Public archive; coverage depth TBD |\r\n| Court decisions + land records | Legal corpus | Israeli courts | Public filings; spatial tagging needed |\r\n| Open satellite imagery | Raster | Current + recent historical | Sentinel-2, Landsat, others |\r\n| GIS layers (various) | Vector + raster | TBD per layer | Need to enumerate specific layers |\r\n| PalOpenMaps.org | Historical cadastral maps | Ottoman + British Mandate era | **High value** -- exactly the historical boundary layer needed for West Bank disputes |\r\n\r\n## Restricted Layer (Permission Request Required)\r\n\r\n| Source | Type | Holder | Status |\r\n|--------|------|--------|--------|\r\n| Mordi's case files | Legal case evidence | Mordi Verzberger | Requires Mordi authorization + client consent |\r\n\r\n## Key Insight: Biti Hills PoC May Not Require Restricted Layer\r\n\r\nThe Biti Hills verdict is public. The missing evidence in that case was temporal aerial proof of continuous cultivation -- which falls in the public layer (Survey Institute aerials + PalOpenMaps historical cadastral).\r\n\r\n**PoC hypothesis:** Reconstruct the missing evidence retroactively using public data only.\r\nIf the public layer answers the question the court couldn't answer -- that IS the demo.\r\nNo restricted data needed to prove the system.\r\n\r\n## MVP Scope Decision (Pending)\r\n\r\n- Phase 1: Build fusion pipeline on public layer only\r\n- Phase 2: Request access to restricted archives once working system exists\r\n  - Stronger ask: \"Here is what the system produces on public data. Access unlocks X more.\"\r\n- Fallback: If public layer is insufficient for Biti Hills, identify alternative case with full public evidence coverage\r\n\r\n## Next Step: Enumerate GIS Layers\r\n\r\n\"Several GIS layers\" needs to become a specific list with coverage areas and access terms.\r\nWhich layers are in scope?\r\n","excerpt":"--- source: larry-session date: 2026-06-30 section: solution-design --- ## Public Layer (Build Now, No Permission Required) | Source | Type | Coverage | Notes | |--------|------|----------|-------| |...","date":"2026-07-01"},{"filename":"initial-exploration.md","title":"Platform Architecture: Multi-Source Fusion with Provenance","content":"---\r\nsource: new-project exploration\r\ndate: 2026-06-22\r\n---\r\n\r\n# Platform Architecture: Multi-Source Fusion with Provenance\r\n\r\n## Core Design Decisions Reached\r\n\r\n### Fusion Level: Decision-Level (not data-level or feature-level)\r\nThree-level hierarchy from remote sensing literature:\r\n- Data-level: overlay raw rasters -- simple, sensitive to misregistration\r\n- Feature-level: extract features from each source, combine -- robust when sources disagree\r\n- **Decision-level (selected):** each source independently votes on a boundary/feature, then reconcile\r\n\r\nDecision-level is chosen because it keeps each piece of evidence auditable. In an adversarial dispute context, \"correct output\" means defensible output. Each source's contribution remains inspectable.\r\n\r\n### Output Layer: Annotation over Current Imagery\r\n- Current satellite/drone imagery = ground truth\r\n- Historical evidence = overlay annotations (old fence lines, vanished features, testimony markers)\r\n- Each annotation tagged to: source document + date + methodology + confidence\r\n\r\n### Testimony Integration: Corroboration, Not Foundation\r\nParticipatory GIS (PGIS) literature finding: testimony enriches and corroborates spatial evidence but rarely stands alone as a boundary determinant in legal settings. Testimony points are filed as annotations with explicit epistemic weight -- never as primary evidence.\r\n\r\n### What the System Is NOT\r\nNot a generative/normative system. Does not synthesize \"where things should be.\" A synthesized authoritative-looking boundary image is the worst artifact to introduce in a dispute -- it encodes model guesses as visual authority.\r\n\r\n## Platform Ambition\r\nThe fusion methodology is application-agnostic. Legal exhibits today. Agricultural change detection, infrastructure inspection, UXO mapping -- same engine, different output packaging. The platform is the moat; the legal application is the wedge.\r\n\r\n## Core Architecture: Bidirectional Bridge (Filed 2026-06-30)\r\n\r\nValidated by ISA contact interview (via Mordi). ISA has GIS. ISA has documents. They are missing the bridge between them.\r\n\r\n### The Two Translation Directions\r\n\r\n**Text → Geo:**\r\nHistorical deeds, Ottoman records, court verdicts, testimonies contain geographic descriptions in natural language (\"from the oak tree to the hill\"). The system extracts these references and grounds them to spatial coordinates. Textual evidence becomes an Observation in geographic space.\r\n\r\n**Geo → Text:**\r\nGiven a parcel, coordinate, or bounding area -- retrieve all textual evidence in the corpus that references that location. Geography becomes a query into the document layer. A judge can ask \"what does the record say about this area?\" from a map interface.\r\n\r\n### Cross-Modal Layer (Between the Two Spaces)\r\nAerial imagery, satellite, historical maps, drone footage. These are neither pure text nor pure coordinates. They corroborate or contradict what the two spaces say about each other. The decision-level fusion architecture handles this: each modality votes independently, reconciled at the Observation level.\r\n\r\n### Why the Observation Is the Bridge\r\nAn Observation has a location (geographic) AND a textual claim with a source (textual). It lives in both spaces simultaneously. It is the atomic unit because it is the unit of translation between spaces.\r\n\r\n### ISA Contact Signal\r\n\"Missing many layers on top of GIS -- textual data related to the geographical area.\"\r\nThis is the exact product described above. Validated from buyer side, unprompted.\r\n\r\n## Atomic Unit Decision (Filed 2026-06-30)\r\n\r\n**The atomic unit of the system is the Observation.**\r\n\r\nShape: `(location, time, condition, source, confidence)`\r\n\r\nAn Observation is a spatiotemporal claim -- something that was true at a specific location, at a specific time, as evidenced by a specific source with a defined confidence level.\r\n\r\nEvery piece of data the system ingests produces Observations:\r\n- A historical aerial photo → dozens of Observations (fence lines, trees, structures visible at that date)\r\n- A court verdict → Observations (legal findings about what existed when and where)\r\n- An Ottoman land record → Observations (boundary descriptions converted to coordinates)\r\n- Witness testimony → Observations (lower confidence, corroborating role only)\r\n\r\n**Why not Parcel:** The parcel boundary is what is contested in a dispute -- indexing on it creates a circular dependency. Also, 70% of West Bank parcels are unregistered.\r\n\r\n**Why not Coordinate alone:** Coordinates are correct but insufficient -- the temporal dimension is load-bearing. The same coordinate means different things in 1959 and 2024.\r\n\r\n**The translation layer:** Mordi queries by parcel. The engine stores by Observation. The layer that converts a parcel query into a spatiotemporal bounding box query is part of the product.\r\n\r\n**Compounding effect:** Every new document ingested produces new Observations that enrich all prior cases touching the same area. This is the network effect -- not a strategy claim, a technical inevitability of the data model.\r\n","excerpt":"--- source: new-project exploration date: 2026-06-22 --- ## Core Design Decisions Reached ### Fusion Level: Decision-Level (not data-level or feature-level) Three-level hierarchy from remote sensing...","date":"2026-07-01"}]},{"id":"team-execution","label":"Team Execution","color":"#1E3A6E","entryCount":0,"summary":"","artifacts":[]}],"intelligence":{"gaps":[],"convergence":[],"contradictions":[]},"graph":{"elements":{"nodes":[{"data":{"id":"problem-definition","label":"PROBLEM DEFINITION","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"market-analysis","label":"MARKET ANALYSIS","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"solution-design","label":"SOLUTION DESIGN","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"business-model","label":"BUSINESS MODEL","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"competitive-analysis","label":"COMPETITIVE ANALYSIS","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"team-execution","label":"TEAM EXECUTION","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"legal-ip","label":"LEGAL IP","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"},{"data":{"id":"financial-model","label":"FINANCIAL MODEL","type":"Section","knowledge_type":null,"color":"#1A1A1A","degree":0,"review_status":null},"classes":"section-group"}],"edges":[]}},"stats":{"artifacts":9,"meetings":0,"speakers":0,"sections":8,"edges":0},
