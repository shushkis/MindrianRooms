<script>
/**
 * MindrianOS Plugin -- Universal Canvas 2D Graph Renderer
 * Ported from the Milken Twin implementation, adapted to consume
 * graph.json (Cytoscape format) from build-graph-from-sqlite.cjs.
 *
 * Zero dependencies. Embeddable via script tag or CJS require.
 *
 * Usage:
 *   const graph = new CanvasGraph(containerEl, graphJsonData, { onNodeClick });
 *   graph.highlightCluster('market-analysis');
 *   graph.destroy();
 */

'use strict';

var EDGE_STYLES = {
  INFORMS:         { color: '#888888', width: 0.8, dash: null, arrow: true },
  CONTRADICTS:     { color: '#FF4B4B', width: 1.5, dash: [6, 4], arrow: false },
  CONVERGES:       { color: '#C8A43C', width: 1.2, dash: [2, 4], arrow: false },
  ENABLES:         { color: '#4A90D9', width: 1.5, dash: null, arrow: true },
  HSI_CONNECTION:  { color: '#8B6FE8', width: 0.8, dash: [2, 3], arrow: false },
  REVERSE_SALIENT: { color: '#FF8C42', width: 1.2, dash: [6, 4], arrow: false },
};

var DEFAULT_EDGE = { color: '#888888', width: 0.3, dash: null, arrow: false };

function CanvasGraph(container, graphData, options) {
  if (!container) throw new Error('CanvasGraph: container element required');
  options = options || {};
  var self = this;

  // -- Parse graph data --
  var rawNodes = (graphData && graphData.elements && graphData.elements.nodes) || [];
  var rawEdges = (graphData && graphData.elements && graphData.elements.edges) || [];

  // Build internal nodes
  var nodes = [];
  var nodeMap = {};
  var adjacency = {}; // id -> Set of neighbor ids

  rawNodes.forEach(function(n) {
    var d = n.data || {};
    var node = {
      id: d.id,
      label: d.label || '',
      color: d.color || '#5C5A56',
      section: d.section || '',
      layer: d.layer || 'content',
      cls: (n.classes || '').split(/\s+/)[0] || 'artifact',
      data: d,
      r: 12,
      x: 0, y: 0, vx: 0, vy: 0
    };
    nodes.push(node);
    nodeMap[node.id] = node;
    adjacency[node.id] = new Set();
  });

  // Build internal edges
  var edges = [];
  rawEdges.forEach(function(e) {
    var d = e.data || {};
    if (!nodeMap[d.source] || !nodeMap[d.target]) return;
    edges.push({
      source: d.source,
      target: d.target,
      type: d.type || 'BELONGS_TO',
      label: d.label || '',
      data: d
    });
    adjacency[d.source] = adjacency[d.source] || new Set();
    adjacency[d.target] = adjacency[d.target] || new Set();
    adjacency[d.source].add(d.target);
    adjacency[d.target].add(d.source);
  });

  // Compute degree centrality for node radius
  nodes.forEach(function(n) {
    if (n.cls === 'section-group') {
      n.r = 24;
    } else {
      var degree = adjacency[n.id] ? adjacency[n.id].size : 0;
      n.r = Math.max(8, Math.min(20, 6 + degree * 2));
    }
  });

  // -- Canvas setup --
  var canvas = document.createElement('canvas');
  container.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0;
  var animId = null;
  var particles = [];
  var frameCount = 0;
  var mouseX = -999, mouseY = -999;
  var hoveredNode = null;
  self._highlightState = null;

  function sizeCanvas() {
    var rect = container.getBoundingClientRect();
    W = rect.width || 800;
    H = rect.height || 600;
    canvas.width = W * 2;
    canvas.height = H * 2;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(2, 2);
  }

  sizeCanvas();

  // Initialize positions in circular spread with jitter
  var cx = W / 2, cy = H / 2;
  nodes.forEach(function(n, i) {
    var a = (i / nodes.length) * Math.PI * 2;
    var spread = 120 + Math.random() * 80;
    n.x = cx + Math.cos(a) * spread + (Math.random() - 0.5) * 60;
    n.y = cy + Math.sin(a) * spread + (Math.random() - 0.5) * 60;
    n.vx = 0;
    n.vy = 0;
  });

  // -- ResizeObserver --
  var resizeObserver = null;
  if (typeof ResizeObserver !== 'undefined') {
    resizeObserver = new ResizeObserver(function() { self.resize(); });
    resizeObserver.observe(container);
  }

  // -- Mouse events --
  canvas.addEventListener('mousemove', function(e) {
    var r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
  });
  canvas.addEventListener('mouseleave', function() { mouseX = -999; mouseY = -999; });
  canvas.addEventListener('click', function() {
    if (!hoveredNode) return;
    var nodeEdges = edges.filter(function(e) {
      return e.source === hoveredNode.id || e.target === hoveredNode.id;
    });
    if (typeof options.onNodeClick === 'function') {
      options.onNodeClick(hoveredNode.data);
    } else if (typeof window !== 'undefined' && window.GraphDetailPanel && typeof window.GraphDetailPanel.show === 'function') {
      window.GraphDetailPanel.show(hoveredNode.data, nodeEdges.map(function(e) { return e.data; }));
    }
  });

  // -- Force simulation --
  function simulate() {
    var cx2 = W / 2, cy2 = H / 2;
    var i, j, n, dx, dy, d, force;

    // Gravity to center
    for (i = 0; i < nodes.length; i++) {
      n = nodes[i];
      n.vx += (cx2 - n.x) * 0.0008;
      n.vy += (cy2 - n.y) * 0.0008;
    }

    // Node-node repulsion
    for (i = 0; i < nodes.length; i++) {
      for (j = i + 1; j < nodes.length; j++) {
        dx = nodes[j].x - nodes[i].x;
        dy = nodes[j].y - nodes[i].y;
        d = Math.sqrt(dx * dx + dy * dy) || 1;
        force = 800 / (d * d);
        nodes[i].vx -= (dx / d) * force;
        nodes[i].vy -= (dy / d) * force;
        nodes[j].vx += (dx / d) * force;
        nodes[j].vy += (dy / d) * force;
      }
    }

    // Edge attraction
    edges.forEach(function(e) {
      var a = nodeMap[e.source], b = nodeMap[e.target];
      if (!a || !b) return;
      dx = b.x - a.x;
      dy = b.y - a.y;
      d = Math.sqrt(dx * dx + dy * dy) || 1;
      force = (d - 100) * 0.003;
      a.vx += (dx / d) * force;
      a.vy += (dy / d) * force;
      b.vx -= (dx / d) * force;
      b.vy -= (dy / d) * force;
    });

    // Apply velocity with damping + boundary clamping
    for (i = 0; i < nodes.length; i++) {
      n = nodes[i];
      n.vx *= 0.85;
      n.vy *= 0.85;
      n.x += n.vx;
      n.y += n.vy;
      n.x = Math.max(n.r + 10, Math.min(W - n.r - 10, n.x));
      n.y = Math.max(n.r + 10, Math.min(H - n.r - 10, n.y));
    }
  }

  // -- Draw helpers --
  function hexAlpha(hex, alpha) {
    return hex + Math.round(alpha * 255).toString(16).padStart(2, '0');
  }

  function drawArrowhead(x1, y1, x2, y2, size, color, alpha) {
    var angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.save();
    ctx.translate(x2, y2);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-size, -size / 2.5);
    ctx.lineTo(-size, size / 2.5);
    ctx.closePath();
    ctx.fillStyle = hexAlpha(color, alpha);
    ctx.fill();
    ctx.restore();
  }

  function getEdgeStyle(type) {
    return EDGE_STYLES[type] || DEFAULT_EDGE;
  }

  // -- Draw frame --
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frameCount++;

    // Find hovered node
    hoveredNode = null;
    for (var hi = 0; hi < nodes.length; hi++) {
      var dx = mouseX - nodes[hi].x, dy = mouseY - nodes[hi].y;
      if (Math.sqrt(dx * dx + dy * dy) < nodes[hi].r + 8) {
        hoveredNode = nodes[hi];
      }
    }

    // Compute connected set for hovered node
    var connectedIds = null;
    if (hoveredNode) {
      connectedIds = new Set();
      connectedIds.add(hoveredNode.id);
      if (adjacency[hoveredNode.id]) {
        adjacency[hoveredNode.id].forEach(function(nid) { connectedIds.add(nid); });
      }
    }

    // Spawn particles on random edges every 8 frames
    if (frameCount % 8 === 0 && edges.length > 0) {
      var pe = edges[Math.floor(Math.random() * edges.length)];
      var pa = nodeMap[pe.source], pb = nodeMap[pe.target];
      if (pa && pb) {
        particles.push({
          sx: pa.x, sy: pa.y, tx: pb.x, ty: pb.y,
          t: 0, speed: 0.008 + Math.random() * 0.012,
          color: pa.color || '#C9A050'
        });
      }
    }

    // Draw edges
    edges.forEach(function(e) {
      var a = nodeMap[e.source], b = nodeMap[e.target];
      if (!a || !b) return;
      var style = getEdgeStyle(e.type);
      var isHovered = hoveredNode && (e.source === hoveredNode.id || e.target === hoveredNode.id);
      var alpha, lw;

      if (hoveredNode) {
        if (isHovered) {
          alpha = 0.7;
          lw = style.width * 2;
        } else {
          alpha = 0.06;
          lw = style.width * 0.5;
        }
      } else {
        alpha = 0.35;
        lw = style.width;
      }

      // Highlight state overlay
      if (self._highlightState) {
        if (self._highlightState.edgeType && e.type === self._highlightState.edgeType) {
          alpha = 0.8; lw = style.width * 2;
        } else if (self._highlightState.ids && (self._highlightState.ids.has(e.source) || self._highlightState.ids.has(e.target))) {
          alpha = 0.6; lw = style.width * 1.5;
        }
      }

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = hexAlpha(style.color, alpha);
      ctx.lineWidth = lw;
      if (style.dash) { ctx.setLineDash(style.dash); } else { ctx.setLineDash([]); }
      ctx.stroke();
      ctx.setLineDash([]);

      // Arrowhead
      if (style.arrow) {
        drawArrowhead(a.x, a.y, b.x, b.y, 8, style.color, alpha);
      }
    });

    // Draw and update particles
    particles = particles.filter(function(p) {
      p.t += p.speed;
      if (p.t > 1) return false;
      var x = p.sx + (p.tx - p.sx) * p.t;
      var y = p.sy + (p.ty - p.sy) * p.t;
      var alpha = Math.sin(p.t * Math.PI);
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.round(alpha * 200).toString(16).padStart(2, '0');
      ctx.fill();
      // Trail particle
      var tx = p.sx + (p.tx - p.sx) * (p.t - 0.03);
      var ty = p.sy + (p.ty - p.sy) * (p.t - 0.03);
      ctx.beginPath();
      ctx.arc(tx, ty, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.round(alpha * 80).toString(16).padStart(2, '0');
      ctx.fill();
      return true;
    });

    // Draw nodes
    nodes.forEach(function(n, ni) {
      var isHov = hoveredNode === n;
      var isConn = connectedIds ? connectedIds.has(n.id) : false;
      var alpha = hoveredNode ? (isHov || isConn ? 1 : 0.15) : 0.85;
      var color = n.color;

      // Highlight state alpha boost
      if (self._highlightState && self._highlightState.ids && self._highlightState.ids.has(n.id)) {
        alpha = 1;
      }

      // Ambient pulse for section-group nodes
      var pulseR = 0;
      if (n.cls === 'section-group' && !hoveredNode) {
        pulseR = Math.sin(frameCount * 0.03 + ni * 0.5) * 3;
      }

      // Glow ring on hovered or section-group
      if (isHov || n.cls === 'section-group') {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + 10 + pulseR, 0, Math.PI * 2);
        var glow = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r + 12 + pulseR);
        glow.addColorStop(0, color + (isHov ? '66' : '22'));
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fill();
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + pulseR, 0, Math.PI * 2);
      ctx.fillStyle = hexAlpha(color, alpha * 0.6);
      ctx.fill();
      ctx.strokeStyle = isHov ? '#ffffff' : hexAlpha(color, alpha > 0.5 ? 0.33 : 0.13);
      ctx.lineWidth = isHov ? 2.5 : (n.cls === 'section-group' ? 1.2 : 0.6);
      ctx.stroke();

      // Label
      var showLabel = n.r > 12 || isHov || isConn;
      if (showLabel) {
        var fontSize = isHov ? 14 : (n.r > 14 ? 13 : 11);
        var weight = isHov || n.r > 16 ? '600' : '400';
        ctx.font = weight + ' ' + fontSize + 'px Inter,sans-serif';
        ctx.fillStyle = 'rgba(238,240,244,' + alpha + ')';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(n.label, n.x, n.y + n.r + pulseR + 6);
      }
    });

    // Cursor
    canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
  }

  // -- Animation loop --
  function animate() {
    simulate();
    draw();
    animId = requestAnimationFrame(animate);
  }
  animate();

  // -- Store internals for prototype method access --
  this._s = {
    nodes: nodes, edges: edges, nodeMap: nodeMap,
    highlightState: highlightState,
    animId: animId, resizeObserver: resizeObserver,
    canvas: canvas, sizeCanvas: sizeCanvas,
    getW: function() { return W; }, getH: function() { return H; },
    setCx: function(v) { cx = v; }, setCy: function(v) { cy = v; }
  };
}

/**
 * Highlight a cluster by section name or edge type.
 * Auto-resets after 2 seconds.
 */
CanvasGraph.prototype.highlightCluster = function(group) {
  var s = this._s;
  var self = this;
  var nodes = s.nodes, edges = s.edges;

  // Clear previous
  if (self._highlightState && self._highlightState.timeout) clearTimeout(self._highlightState.timeout);

  var ids = new Set();
  var edgeType = null;

  // Check if group matches an edge type
  if (EDGE_STYLES[group]) {
    edgeType = group;
    edges.forEach(function(e) {
      if (e.type === group) { ids.add(e.source); ids.add(e.target); }
    });
  } else {
    // Section name match
    nodes.forEach(function(n) {
      if (n.data.section === group || n.id === group) ids.add(n.id);
    });
  }

  // Temporarily increase radius for highlighted nodes
  nodes.forEach(function(n) {
    if (ids.has(n.id)) n.r += 6;
  });

  self._highlightState = {
    ids: ids,
    edgeType: edgeType,
    timeout: setTimeout(function() {
      nodes.forEach(function(n) {
        if (ids.has(n.id)) n.r -= 6;
      });
      self._highlightState = null;
    }, 2000)
  };
};

/** Stop animation, remove canvas, clean up listeners. */
CanvasGraph.prototype.destroy = function() {
  var s = this._s;
  if (s.animId) cancelAnimationFrame(s.animId);
  s.animId = null;
  if (s.resizeObserver) s.resizeObserver.disconnect();
  if (s.canvas.parentElement) s.canvas.parentElement.removeChild(s.canvas);
};

/** Manually trigger resize (also handled by ResizeObserver). */
CanvasGraph.prototype.resize = function() {
  var s = this._s;
  s.sizeCanvas();
  s.setCx(s.getW() / 2);
  s.setCy(s.getH() / 2);
};

// Module exports
if (typeof window !== 'undefined') window.CanvasGraph = CanvasGraph;
if (typeof module !== 'undefined') module.exports = CanvasGraph;

</script>

<script>
/**
 * MindrianOS Plugin -- Slide-in Graph Detail Panel
 * Shows node info and cross-section connections when a graph node is clicked.
 *
 * Zero dependencies. Self-contained CSS via injected style tag.
 * Embeddable via script tag or CJS require.
 *
 * Usage:
 *   GraphDetailPanel.init(containerEl);   // optional, defaults to document.body
 *   GraphDetailPanel.show(nodeData, allEdges);
 *   GraphDetailPanel.hide();
 */

'use strict';

var EDGE_TYPE_COLORS = {
  INFORMS: '#888888',
  CONTRADICTS: '#FF4B4B',
  CONVERGES: '#C8A43C',
  ENABLES: '#4A90D9',
  HSI_CONNECTION: '#8B6FE8',
  REVERSE_SALIENT: '#FF8C42',
};

var GraphDetailPanel = {
  _panel: null,
  _content: null,
  _initialized: false,

  /** Create the panel DOM structure. Call once. */
  init: function(containerEl) {
    if (this._initialized) return;
    var host = containerEl || document.body;

    // Inject styles
    var style = document.createElement('style');
    style.textContent = [
      '.gdp-panel { position:fixed; top:0; right:0; width:360px; height:100vh; background:#1A1A1A; border-left:3px solid #5C5A56; transform:translateX(100%); transition:transform 0.3s ease; z-index:10000; overflow-y:auto; font-family:"DM Sans","Inter",sans-serif; color:#EEF0F4; padding:24px 20px; box-sizing:border-box; }',
      '.gdp-panel.gdp-open { transform:translateX(0); }',
      '.gdp-close { position:absolute; top:12px; right:14px; background:none; border:none; color:#EEF0F4; font-size:22px; cursor:pointer; opacity:0.6; }',
      '.gdp-close:hover { opacity:1; }',
      '.gdp-label { font-size:20px; font-weight:600; margin:0 0 10px 0; line-height:1.3; }',
      '.gdp-badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:500; background:#333; margin-right:6px; margin-bottom:6px; }',
      '.gdp-section-row { font-size:13px; color:#AAA; margin-bottom:4px; }',
      '.gdp-section-row span { color:#EEF0F4; }',
      '.gdp-divider { border:none; border-top:1px solid #333; margin:14px 0; }',
      '.gdp-conns-title { font-size:14px; font-weight:600; margin-bottom:8px; }',
      '.gdp-conn { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:6px; }',
      '.gdp-conn-badge { padding:1px 7px; border-radius:8px; font-size:10px; font-weight:600; color:#1A1A1A; white-space:nowrap; }',
      '.gdp-arrow { color:#666; font-size:11px; }',
      '.gdp-summary { font-family:"Source Serif 4",serif; font-size:14px; line-height:1.6; color:#CCC; margin-top:10px; }',
    ].join('\n');
    host.appendChild(style);

    // Create panel
    var panel = document.createElement('div');
    panel.className = 'gdp-panel';
    panel.innerHTML = '<button class="gdp-close" aria-label="Close">&times;</button><div class="gdp-content"></div>';
    host.appendChild(panel);

    this._panel = panel;
    this._content = panel.querySelector('.gdp-content');

    var self = this;
    panel.querySelector('.gdp-close').addEventListener('click', function() { self.hide(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') self.hide();
    });

    this._initialized = true;
  },

  /** Populate and slide in the panel. */
  show: function(nodeData, allEdges) {
    if (!this._initialized) this.init();
    var nd = nodeData || {};
    var color = nd.color || '#5C5A56';
    this._panel.style.borderLeftColor = color;

    var html = '';

    // Header
    html += '<h2 class="gdp-label" style="color:' + color + '">' + esc(nd.label || nd.id || 'Node') + '</h2>';

    // Type badge
    var cls = nd.layer || 'content';
    html += '<span class="gdp-badge">' + esc(cls) + '</span>';

    // Section
    if (nd.section) {
      html += '<div class="gdp-section-row">Section: <span>' + esc(nd.section.replace(/-/g, ' ')) + '</span></div>';
    }
    // Methodology
    if (nd.methodology) {
      html += '<div class="gdp-section-row">Methodology: <span>' + esc(nd.methodology.replace(/-/g, ' ')) + '</span></div>';
    }
    // Meeting date
    if (nd.meeting_date) {
      html += '<div class="gdp-section-row">Meeting date: <span>' + esc(nd.meeting_date) + '</span></div>';
    }
    // Speaker role
    if (nd.role) {
      html += '<div class="gdp-section-row">Role: <span>' + esc(nd.role) + '</span></div>';
    }
    // Assumption status
    if (nd.status) {
      var sc = nd.status === 'valid' ? '#4CAF50' : nd.status === 'invalid' ? '#FF4B4B' : '#C8A43C';
      html += '<div class="gdp-section-row">Status: <span style="color:' + sc + '">' + esc(nd.status) + '</span></div>';
    }

    // Cross-section connections
    var connEdges = (allEdges || []).filter(function(e) {
      return e.source === nd.id || e.target === nd.id;
    });
    if (connEdges.length > 0) {
      html += '<hr class="gdp-divider">';
      html += '<div class="gdp-conns-title">Connections (' + connEdges.length + ')</div>';

      // Group by type
      var groups = {};
      connEdges.forEach(function(e) {
        var t = e.type || 'RELATED';
        if (!groups[t]) groups[t] = [];
        groups[t].push(e);
      });

      Object.keys(groups).forEach(function(type) {
        var badgeColor = EDGE_TYPE_COLORS[type] || '#666';
        groups[type].forEach(function(e) {
          var isOutgoing = e.source === nd.id;
          var otherId = isOutgoing ? e.target : e.source;
          var arrow = isOutgoing ? '\u2192' : '\u2190';
          html += '<div class="gdp-conn">';
          html += '<span class="gdp-conn-badge" style="background:' + badgeColor + '">' + esc(type) + '</span>';
          html += '<span class="gdp-arrow">' + arrow + '</span>';
          html += '<span>' + esc(otherId) + '</span>';
          html += '</div>';
        });
      });
    }

    // Summary
    html += '<hr class="gdp-divider">';
    var summary = nd.desc || nd.summary || 'No summary available.';
    html += '<div class="gdp-summary">' + esc(summary) + '</div>';

    this._content.innerHTML = html;
    this._panel.classList.add('gdp-open');
  },

  /** Slide the panel out. */
  hide: function() {
    if (this._panel) this._panel.classList.remove('gdp-open');
  }
};

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Module exports
if (typeof window !== 'undefined') window.GraphDetailPanel = GraphDetailPanel;
if (typeof module !== 'undefined') module.exports = GraphDetailPanel;

</script>

<script>
/**
 * MindrianOS Plugin -- Chat Context Builder
 * Builds Larry's system prompt from ROOM_DATA for the BYOAPI chat panel.
 *
 * Zero dependencies. Embeddable via script tag or CJS require.
 * Follows var/IIFE pattern matching canvas-graph.js.
 */

'use strict';

var ChatContext = (function() {

  /**
   * Build room context string from ROOM_DATA.
   * Summarizes room name, governing thought, sections, and graph stats.
   * @param {object} roomData - The ROOM_DATA object injected into the page
   * @returns {string} Context string, max ~2000 chars
   */
  function buildRoomContext(roomData) {
    if (!roomData) return 'No room data available.';

    var parts = [];
    var charBudget = 2000;

    // Room name
    var roomName = (roomData.state && roomData.state.name)
      || roomData.roomName
      || 'Unnamed Room';
    parts.push('Room: ' + roomName);

    // Stage
    var stage = (roomData.state && roomData.state.stage)
      || roomData.stage
      || '';
    if (stage) {
      parts.push('Stage: ' + stage);
    }

    // Governing thought from MINTO
    if (roomData.minto) {
      var gt = '';
      if (typeof roomData.minto === 'string') {
        // MINTO content as raw string
        var gtMatch = roomData.minto.match(/governing_thought:\s*["']?([^"'\n]+)/);
        if (gtMatch) gt = gtMatch[1].trim();
      } else if (roomData.minto.governing_thought) {
        gt = roomData.minto.governing_thought;
      }
      if (gt) {
        parts.push('Governing Thought: ' + gt);
      }
      // Pyramid levels
      if (roomData.minto.levels && roomData.minto.levels.length > 0) {
        parts.push('MINTO Levels: ' + roomData.minto.levels.join(', '));
      }
    }

    // Sections with artifact counts
    var sections = (roomData.state && roomData.state.sections)
      || roomData.sections
      || [];
    if (sections.length > 0) {
      var sectionLines = [];
      for (var i = 0; i < sections.length; i++) {
        var s = sections[i];
        var label = s.label || s.id || s.name || ('Section ' + (i + 1));
        var count = s.entryCount || s.artifacts || s.count || 0;
        sectionLines.push('  - ' + label + ' (' + count + ' artifacts)');
      }
      parts.push('Sections:\n' + sectionLines.join('\n'));
    }

    // Graph structure summary
    var graph = roomData.graph;
    if (graph && graph.elements) {
      var nodeCount = (graph.elements.nodes || []).length;
      var edgeCount = (graph.elements.edges || []).length;

      if (nodeCount > 0 || edgeCount > 0) {
        var graphLine = 'Graph: ' + nodeCount + ' nodes, ' + edgeCount + ' edges';

        // Edge type distribution
        var edgeTypes = {};
        var edgeArr = graph.elements.edges || [];
        for (var j = 0; j < edgeArr.length; j++) {
          var eType = (edgeArr[j].data && edgeArr[j].data.type) || 'unknown';
          edgeTypes[eType] = (edgeTypes[eType] || 0) + 1;
        }
        var typeStrs = [];
        for (var t in edgeTypes) {
          if (edgeTypes.hasOwnProperty(t)) {
            typeStrs.push(t + ':' + edgeTypes[t]);
          }
        }
        if (typeStrs.length > 0) {
          graphLine += ' [' + typeStrs.join(', ') + ']';
        }
        parts.push(graphLine);
      }
    }

    // Stats
    if (roomData.stats) {
      var statParts = [];
      if (roomData.stats.meetings) statParts.push(roomData.stats.meetings + ' meetings');
      if (roomData.stats.speakers) statParts.push(roomData.stats.speakers + ' speakers');
      if (roomData.stats.artifacts) statParts.push(roomData.stats.artifacts + ' total artifacts');
      if (statParts.length > 0) {
        parts.push('Stats: ' + statParts.join(', '));
      }
    }

    // Current view
    if (roomData.currentView) {
      parts.push('Current view: ' + roomData.currentView);
    }

    // Assemble and truncate
    var result = parts.join('\n');
    if (result.length > charBudget) {
      result = result.slice(0, charBudget - 15) + '\n[...truncated]';
    }
    return result;
  }

  /**
   * Build the full system prompt for Larry, embedding voice DNA and room context.
   * @param {string} roomContext - Output of buildRoomContext()
   * @returns {string} Full system prompt
   */
  function buildSystemPrompt(roomContext) {
    var voiceDNA = [
      'You are Larry, an AI innovation co-founder embedded in a MindrianOS Data Room.',
      '',
      'VOICE RULES:',
      '- Conversational, not academic. Provocative, not condescending.',
      '- Concise: most responses 3-8 sentences, not 30.',
      '- Warm but demanding. Curious, not interrogating.',
      '- If your response looks like it belongs in a PDF, delete it and start over.',
      '',
      'SIGNATURE OPENERS (rotate naturally):',
      '- "Very simply..." when distilling complexity',
      '- "Think about it like this..." when reframing',
      '- "Here\'s what everyone misses..." when revealing hidden insight',
      '- "Let me challenge you with this..." when provoking deeper thinking',
      '- "Notice what\'s happening here..." when surfacing patterns',
      '',
      'REFRAME TECHNIQUE (your power move, use sparingly):',
      '- Flip the user\'s framing to reveal something they didn\'t see.',
      '- "You\'re thinking about this as X. But what if it\'s actually Y?"',
      '- "That\'s not a problem -- that\'s a category containing dozens of problems."',
      '',
      'PACING: Use short punchy sentences for key insights. Let insights breathe.',
    ].join('\n');

    var instructions = [
      '',
      '== Room Context ==',
      roomContext || 'No room context available.',
      '',
      '== Instructions ==',
      'You are Larry, embedded in a MindrianOS Data Room. Answer questions about THIS room\'s content.',
      'You can reference specific sections, artifacts, graph relationships, and the governing thought.',
      'When discussing the room\'s structure, you may reference Simon\'s Architecture of Complexity naturally -- never as a lecture.',
      'You can call tools to highlight graph clusters and filter views.',
      'Stay grounded in the room data above. If asked about something not in the room, say so.',
    ].join('\n');

    return voiceDNA + instructions;
  }

  return {
    buildRoomContext: buildRoomContext,
    buildSystemPrompt: buildSystemPrompt
  };

})();

// Module exports
if (typeof window !== 'undefined') {
  window.ChatContext = ChatContext;
}
if (typeof module !== 'undefined') {
  module.exports = ChatContext;
}

</script>

<script>
/**
 * MindrianOS Plugin -- Generative Tools for Larry Chat
 * Defines AI tool definitions (Anthropic API format), execution handlers,
 * and a declarative UI renderer (json-render pattern) for inline components.
 *
 * Tools:
 *   - highlightCluster: highlight graph nodes by section or edge type
 *   - filterEdgeType: filter graph to show specific edge type
 *   - showInsight: render structured insight card inline in chat
 *
 * Zero dependencies. Embeddable via script tag or CJS require.
 * Follows var/IIFE pattern matching canvas-graph.js and chat-panel.js.
 *
 * Usage:
 *   GenerativeTools.TOOL_DEFINITIONS  // array for Anthropic API tools param
 *   GenerativeTools.executeToolCall(name, input, context)
 *   GenerativeTools.renderComponent(component)  // returns HTML string
 */

'use strict';

var GenerativeTools = (function() {

  // -- Tool definitions (Anthropic API format) --

  var TOOL_DEFINITIONS = [
    {
      name: 'highlightCluster',
      description: 'Highlight a group of nodes on the knowledge graph. Use for section names (e.g., "market-analysis", "problem-definition") or edge types (CONTRADICTS, CONVERGES, ENABLES, INFORMS). Always call this when the user asks to "show" or "highlight" something on the graph.',
      input_schema: {
        type: 'object',
        properties: {
          group: { type: 'string', description: 'Section name or edge type to highlight (e.g., "market-analysis", "CONTRADICTS")' }
        },
        required: ['group']
      }
    },
    {
      name: 'filterEdgeType',
      description: 'Filter the graph to show only edges of a specific type. Use when user asks about relationships, connections of a specific kind, or wants to focus on contradictions/convergences/etc.',
      input_schema: {
        type: 'object',
        properties: {
          edgeType: { type: 'string', enum: ['CONTRADICTS', 'CONVERGES', 'ENABLES', 'INFORMS', 'HSI_CONNECTION', 'REVERSE_SALIENT'], description: 'Edge type to filter' }
        },
        required: ['edgeType']
      }
    },
    {
      name: 'showInsight',
      description: 'Render a visual insight card in the chat with structured data. Use when presenting analysis results, summaries, or comparisons. The card renders inline in the chat.',
      input_schema: {
        type: 'object',
        properties: {
          title: { type: 'string', description: 'Card title' },
          items: {
            type: 'array',
            items: {
              type: 'object',
              properties: {
                label: { type: 'string' },
                value: { type: 'string' },
                color: { type: 'string', description: 'Optional hex color for accent' }
              },
              required: ['label', 'value']
            },
            description: 'Key-value items to display'
          },
          footer: { type: 'string', description: 'Optional footer text' }
        },
        required: ['title', 'items']
      }
    }
  ];

  // -- Tool execution --

  function executeToolCall(toolName, toolInput, context) {
    context = context || {};
    var graph = context.graph || null;

    if (toolName === 'highlightCluster') {
      if (!graph || typeof graph.highlightCluster !== 'function') {
        return { success: false, message: 'Graph not available on this view' };
      }
      graph.highlightCluster(toolInput.group);
      return { success: true, message: 'Highlighted ' + toolInput.group };
    }

    if (toolName === 'filterEdgeType') {
      if (!graph || typeof graph.highlightCluster !== 'function') {
        return { success: false, message: 'Graph not available on this view' };
      }
      // highlightCluster already handles edge types
      graph.highlightCluster(toolInput.edgeType);
      return { success: true, message: 'Filtered to ' + toolInput.edgeType + ' edges' };
    }

    if (toolName === 'showInsight') {
      return {
        success: true,
        rendered: true,
        component: {
          type: 'insight-card',
          title: toolInput.title,
          items: toolInput.items,
          footer: toolInput.footer || ''
        }
      };
    }

    return { success: false, message: 'Unknown tool: ' + toolName };
  }

  // -- Declarative UI renderer (json-render pattern, GENUI-01) --

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderComponent(component) {
    if (!component || !component.type) return '';

    if (component.type === 'insight-card') {
      return renderInsightCard(component);
    }

    if (component.type === 'list') {
      return renderList(component);
    }

    if (component.type === 'table') {
      return renderTable(component);
    }

    return '<div style="color:var(--text-muted,#666);font-size:11px;">Unknown component: ' + escapeHtml(component.type) + '</div>';
  }

  function renderInsightCard(comp) {
    var html = '<div style="border-left:3px solid var(--mondrian-yellow,#E8B931);background:rgba(232,185,49,0.06);border-radius:6px;padding:12px 14px;margin:4px 0;font-size:13px;">';
    html += '<div style="font-weight:600;margin-bottom:8px;color:var(--text-primary,#EEF0F4);">' + escapeHtml(comp.title) + '</div>';

    if (comp.items && comp.items.length) {
      for (var i = 0; i < comp.items.length; i++) {
        var item = comp.items[i];
        var colorDot = item.color
          ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + escapeHtml(item.color) + ';margin-right:6px;vertical-align:middle;"></span>'
          : '';
        html += '<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;line-height:1.4;">';
        html += colorDot;
        html += '<span style="color:var(--text-secondary,#999);min-width:80px;">' + escapeHtml(item.label) + '</span>';
        html += '<span style="color:var(--text-primary,#EEF0F4);">' + escapeHtml(item.value) + '</span>';
        html += '</div>';
      }
    }

    if (comp.footer) {
      html += '<div style="margin-top:8px;font-size:11px;color:var(--text-muted,#666);border-top:1px solid var(--border-color,#2A2A2A);padding-top:6px;">' + escapeHtml(comp.footer) + '</div>';
    }

    html += '</div>';
    return html;
  }

  function renderList(comp) {
    var html = '<div style="border-left:3px solid var(--mondrian-blue,#1B3B6F);background:rgba(27,59,111,0.06);border-radius:6px;padding:12px 14px;margin:4px 0;font-size:13px;">';
    if (comp.title) {
      html += '<div style="font-weight:600;margin-bottom:8px;color:var(--text-primary,#EEF0F4);">' + escapeHtml(comp.title) + '</div>';
    }
    if (comp.items && comp.items.length) {
      html += '<ul style="margin:0;padding-left:18px;color:var(--text-primary,#EEF0F4);">';
      for (var i = 0; i < comp.items.length; i++) {
        var item = typeof comp.items[i] === 'string' ? comp.items[i] : (comp.items[i].label || comp.items[i].value || '');
        html += '<li style="margin-bottom:3px;line-height:1.4;">' + escapeHtml(item) + '</li>';
      }
      html += '</ul>';
    }
    html += '</div>';
    return html;
  }

  function renderTable(comp) {
    var html = '<div style="border-left:3px solid var(--mondrian-red,#C23B22);background:rgba(194,59,34,0.06);border-radius:6px;padding:12px 14px;margin:4px 0;font-size:12px;overflow-x:auto;">';
    if (comp.title) {
      html += '<div style="font-weight:600;margin-bottom:8px;font-size:13px;color:var(--text-primary,#EEF0F4);">' + escapeHtml(comp.title) + '</div>';
    }
    if (comp.headers && comp.rows) {
      html += '<table style="width:100%;border-collapse:collapse;">';
      html += '<thead><tr>';
      for (var h = 0; h < comp.headers.length; h++) {
        html += '<th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border-color,#2A2A2A);color:var(--text-secondary,#999);font-weight:500;">' + escapeHtml(comp.headers[h]) + '</th>';
      }
      html += '</tr></thead><tbody>';
      for (var r = 0; r < comp.rows.length; r++) {
        html += '<tr>';
        var row = comp.rows[r];
        for (var c = 0; c < row.length; c++) {
          html += '<td style="padding:4px 8px;border-bottom:1px solid rgba(42,42,42,0.5);color:var(--text-primary,#EEF0F4);">' + escapeHtml(row[c]) + '</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
    }
    html += '</div>';
    return html;
  }

  return {
    TOOL_DEFINITIONS: TOOL_DEFINITIONS,
    executeToolCall: executeToolCall,
    renderComponent: renderComponent
  };

})();

// Module exports
if (typeof window !== 'undefined') window.GenerativeTools = GenerativeTools;
if (typeof module !== 'undefined') module.exports = GenerativeTools;

</script>

<script>
/**
 * MindrianOS Plugin -- BYOAPI Chat Panel
 * Embeddable vanilla JS chat panel for deployed presentation views.
 * Visitors provide their own Anthropic API key (stored in localStorage only).
 * Larry responds with room-scoped context via direct browser-to-API calls.
 *
 * Zero dependencies. Embeddable via script tag or CJS require.
 * Follows var/IIFE pattern matching canvas-graph.js.
 *
 * Usage:
 *   var panel = new ChatPanel(containerEl, { roomData: ROOM_DATA, onToolCall: fn });
 *   panel.destroy();
 */

'use strict';

var ChatPanel = (function() {

  // -- Minimal markdown renderer (~30 lines) --
  function renderMarkdown(text) {
    if (!text) return '';
    var html = text
      // Code blocks (``` ... ```)
      .replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
        return '<pre style="background:rgba(0,0,0,0.3);padding:8px;border-radius:4px;overflow-x:auto;font-size:12px;margin:6px 0"><code>' + escapeHtml(code.trim()) + '</code></pre>';
      })
      // Inline code
      .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Unordered lists
      .replace(/^[\s]*[-*]\s+(.+)$/gm, '<li style="margin-left:16px">$1</li>')
      // Ordered lists
      .replace(/^[\s]*\d+\.\s+(.+)$/gm, '<li style="margin-left:16px">$1</li>')
      // Line breaks
      .replace(/\n/g, '<br>');
    return html;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // -- CSS injection --
  var CSS_INJECTED = false;
  function injectCSS() {
    if (CSS_INJECTED) return;
    CSS_INJECTED = true;
    var style = document.createElement('style');
    style.textContent = [
      '.mos-chat-toggle {',
      '  position: fixed; bottom: 20px; right: 20px; z-index: 10000;',
      '  background: var(--mondrian-yellow, #E8B931); color: #1A1A1A;',

      '',

      '  border-radius: 12px; display: flex; flex-direction: column;',
      '  box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden;',

      '}',
      '',
      '.mos-chat-header {',
      '  display: flex; align-items: center; justify-content: space-between;',
      '  padding: 12px 16px; background: var(--bg-secondary, #161616);',

      '}',
      '.mos-chat-header h3 { margin: 0; font-size: 14px; font-weight: 600; color: var(--text-primary, #EEF0F4); }',
      '.mos-chat-header-actions { display: flex; gap: 6px; align-items: center; }',
      '',
      '.mos-chat-btn {',
      '  background: none; border: 1px solid var(--border-color, #2A2A2A);',
      '  color: var(--text-secondary, #999); cursor: pointer;',

      '  gap: 12px; align-items: center; flex: 1; justify-content: center;',
      '}',
      '.mos-chat-key-form input {',
      '  width: 100%; background: var(--bg-primary, #0D0D0D);',
      '  border: 1px solid var(--border-color, #2A2A2A); color: var(--text-primary, #EEF0F4);',
      '  border-radius: 6px; padding: 10px 12px; font-size: 13px;',
      '  font-family: "DM Sans", sans-serif;',
      '}',
      '.mos-chat-key-form input:focus { outline: none; border-color: var(--mondrian-yellow, #E8B931); }',
      '.mos-chat-key-form input::placeholder { color: var(--text-muted, #666); }',
      '.mos-chat-key-note {',
      '  font-size: 11px; color: var(--text-muted, #666); text-align: center; line-height: 1.4;',
      '}',
      '',

    document.head.appendChild(style);
  }

  // -- Storage keys --
  var KEY_API = 'mos-api-key';
  var KEY_OPEN = 'mos-chat-open';

  // -- Constructor --
  function ChatPanel(containerEl, options) {
    if (!containerEl) throw new Error('ChatPanel: container element required');
    options = options || {};
    var self = this;

    self._container = containerEl;
    self._roomData = options.roomData || {};
    self._onToolCall = options.onToolCall || null;
    self._model = options.model || 'claude-sonnet-4-20250514';
    self._messages = []; // conversation history { role, content }
    self._streaming = false;
    self._destroyed = false;

    // Build context and system prompt
    var contextBuilder = (typeof ChatContext !== 'undefined') ? ChatContext : null;
    if (contextBuilder) {
      var roomCtx = contextBuilder.buildRoomContext(self._roomData);
      self._systemPrompt = contextBuilder.buildSystemPrompt(roomCtx);
    } else {
      self._systemPrompt = 'You are Larry, an AI innovation co-founder. Answer questions helpfully.';
    }

    injectCSS();
    self._build();
  }

  ChatPanel.prototype._build = function() {
    var self = this;
    var apiKey = self._getApiKey();

    // Toggle button
    self._toggleBtn = document.createElement('button');
    self._toggleBtn.className = 'mos-chat-toggle';
    self._toggleBtn.textContent = 'Chat with Larry';
    self._toggleBtn.addEventListener('click', function() { self._toggle(); });
    self._container.appendChild(self._toggleBtn);

    // Panel
    self._panel = document.createElement('div');
    self._panel.className = 'mos-chat-panel';
    self._panel.style.display = 'none';
    self._container.appendChild(self._panel);

    // Header
    var header = document.createElement('div');
    header.className = 'mos-chat-header';
    header.innerHTML = '<h3>Larry</h3><div class="mos-chat-header-actions"></div>';
    self._panel.appendChild(header);
    self._headerActions = header.querySelector('.mos-chat-header-actions');

    // Key management button (small icon)
    self._keyBtn = document.createElement('button');
    self._keyBtn.className = 'mos-chat-btn';
    self._keyBtn.textContent = 'Key';
    self._keyBtn.title = 'Manage API key';
    self._keyBtn.addEventListener('click', function() { self._showKeyForm(); });
    self._headerActions.appendChild(self._keyBtn);

    // Minimize button
    var minBtn = document.createElement('button');
    minBtn.className = 'mos-chat-btn';
    minBtn.textContent = 'Minimize';
    minBtn.addEventListener('click', function() { self._toggle(); });
    self._headerActions.appendChild(minBtn);

    // Body area (switches between key form and chat)
    self._body = document.createElement('div');
    self._body.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;';
    self._panel.appendChild(self._body);

    if (apiKey) {
      self._showChat();
    } else {
      self._showKeyForm();
    }

    // Restore open state
    var wasOpen = localStorage.getItem(KEY_OPEN);
    if (wasOpen === 'true') {
      self._show();
    }
  };

  ChatPanel.prototype._getApiKey = function() {
    try { return localStorage.getItem(KEY_API) || ''; } catch (_) { return ''; }
  };

  ChatPanel.prototype._setApiKey = function(key) {
    try { localStorage.setItem(KEY_API, key); } catch (_) {}
  };

  ChatPanel.prototype._clearApiKey = function() {
    try { localStorage.removeItem(KEY_API); } catch (_) {}
  };

  ChatPanel.prototype._toggle = function() {
    var isVisible = this._panel.style.display !== 'none';
    if (isVisible) {
      this._hide();
    } else {
      this._show();
    }
  };

  ChatPanel.prototype._show = function() {
    this._panel.style.display = 'flex';
    this._toggleBtn.style.display = 'none';
    try { localStorage.setItem(KEY_OPEN, 'true'); } catch (_) {}
  };

  ChatPanel.prototype._hide = function() {
    this._panel.style.display = 'none';
    this._toggleBtn.style.display = 'block';
    try { localStorage.setItem(KEY_OPEN, 'false'); } catch (_) {}
  };

  ChatPanel.prototype._showKeyForm = function() {
    var self = this;
    self._body.innerHTML = '';

    var form = document.createElement('div');
    form.className = 'mos-chat-key-form';

    var input = document.createElement('input');
    input.type = 'password';
    input.placeholder = 'Enter your Anthropic API key to chat with Larry';
    input.value = self._getApiKey();
    form.appendChild(input);

    var saveBtn = document.createElement('button');
    saveBtn.className = 'mos-chat-send';
    saveBtn.textContent = 'Save Key';
    saveBtn.addEventListener('click', function() {
      var val = input.value.trim();
      if (!val) return;
      self._setApiKey(val);
      self._showChat();
    });
    form.appendChild(saveBtn);

    // Clear button (only if key exists)
    if (self._getApiKey()) {
      var clearBtn = document.createElement('button');
      clearBtn.className = 'mos-chat-btn';
      clearBtn.textContent = 'Clear Key';
      clearBtn.style.marginTop = '4px';
      clearBtn.addEventListener('click', function() {
        self._clearApiKey();
        input.value = '';
      });
      form.appendChild(clearBtn);
    }

    var note = document.createElement('div');
    note.className = 'mos-chat-key-note';
    note.textContent = 'Key stored in your browser only -- never sent to any server except Anthropic.';
    form.appendChild(note);

    // Enter key to save
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { saveBtn.click(); }
    });

    self._body.appendChild(form);
  };

  ChatPanel.prototype._showChat = function() {
    var self = this;
    self._body.innerHTML = '';

    // Messages area
    self._msgList = document.createElement('div');
    self._msgList.className = 'mos-chat-messages';
    self._body.appendChild(self._msgList);

    // Re-render existing messages
    for (var i = 0; i < self._messages.length; i++) {
      self._renderMessage(self._messages[i].role, self._messages[i].content);
    }

    // Welcome message if first time
    if (self._messages.length === 0) {
      self._addSystemMsg('Ask Larry about this room\'s content, sections, or knowledge graph.');
    }

    // Input area
    var inputArea = document.createElement('div');
    inputArea.className = 'mos-chat-input-area';
    self._body.appendChild(inputArea);

    self._textarea = document.createElement('textarea');
    self._textarea.placeholder = 'Ask Larry...';
    self._textarea.rows = 1;
    inputArea.appendChild(self._textarea);

    self._sendBtn = document.createElement('button');
    self._sendBtn.className = 'mos-chat-send';
    self._sendBtn.textContent = 'Send';
    inputArea.appendChild(self._sendBtn);

    self._sendBtn.addEventListener('click', function() { self._send(); });
    self._textarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        self._send();
      }
    });
  };

  ChatPanel.prototype._addSystemMsg = function(text) {
    var el = document.createElement('div');
    el.className = 'mos-chat-msg mos-chat-msg-system';
    el.textContent = text;
    this._msgList.appendChild(el);
    this._scrollToBottom();
  };

  ChatPanel.prototype._renderMessage = function(role, content) {
    var el = document.createElement('div');
    el.className = 'mos-chat-msg mos-chat-msg-' + role;
    if (role === 'assistant') {
      el.innerHTML = renderMarkdown(content);
    } else {
      el.textContent = content;
    }
    this._msgList.appendChild(el);
    this._scrollToBottom();
    return el;
  };

  ChatPanel.prototype._scrollToBottom = function() {
    var ml = this._msgList;
    if (ml) ml.scrollTop = ml.scrollHeight;
  };

  ChatPanel.prototype._send = function() {
    var self = this;
    if (self._streaming) return;
    var text = (self._textarea.value || '').trim();
    if (!text) return;

    self._textarea.value = '';

    // Add user message
    self._messages.push({ role: 'user', content: text });
    self._renderMessage('user', text);

    // Cap at 20 messages
    while (self._messages.length > 20) {
      self._messages.shift();
    }

    // Stream response
    self._streamResponse();
  };

  // -- Tool support helpers --

  function getToolDefinitions() {
    if (typeof GenerativeTools !== 'undefined' && GenerativeTools.TOOL_DEFINITIONS) {
      return GenerativeTools.TOOL_DEFINITIONS;
    }
    if (typeof window !== 'undefined' && window.__mosTools && window.__mosTools.TOOL_DEFINITIONS) {
      return window.__mosTools.TOOL_DEFINITIONS;
    }
    return null;
  }

  function execTool(name, input, context) {
    if (typeof GenerativeTools !== 'undefined' && GenerativeTools.executeToolCall) {
      return GenerativeTools.executeToolCall(name, input, context);
    }
    return { success: false, message: 'GenerativeTools not available' };
  }

  function renderToolComponent(component) {
    if (typeof GenerativeTools !== 'undefined' && GenerativeTools.renderComponent) {
      return GenerativeTools.renderComponent(component);
    }
    return '';
  }

  ChatPanel.prototype._streamResponse = function(followUpMessages) {
    var self = this;
    var apiKey = self._getApiKey();
    if (!apiKey) {
      self._showKeyForm();
      return;
    }

    self._streaming = true;
    self._panel.classList.add('mos-chat-streaming');
    if (self._sendBtn) self._sendBtn.disabled = true;

    // Create assistant message element for streaming
    var assistantEl = self._renderMessage('assistant', '');
    var fullText = '';

    // Track content blocks for tool_use handling
    var contentBlocks = [];
    var currentToolUse = null;
    var toolInputBuffer = '';
    var stopReason = '';

    // Use provided messages (for tool_result follow-ups) or conversation history
    var messagesToSend = followUpMessages || self._messages.slice();

    // Build request body
    var requestBody = {
      model: self._model,
      max_tokens: 1024,
      system: self._systemPrompt,
      messages: messagesToSend,
      stream: true
    };

    // Add tool definitions if available
    var tools = getToolDefinitions();
    if (tools) {
      requestBody.tools = tools;
    }

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(requestBody)
    }).then(function(response) {
      if (response.status === 401) {
        self._clearApiKey();
        assistantEl.className = 'mos-chat-msg mos-chat-msg-system';
        assistantEl.textContent = 'Invalid API key. Please enter a valid key.';
        self._endStream();
        self._showKeyForm();
        return;
      }
      if (!response.ok) {
        return response.text().then(function(errText) {
          var errMsg = 'Error (' + response.status + ')';
          try {
            var errJson = JSON.parse(errText);
            if (errJson.error && errJson.error.message) errMsg = errJson.error.message;
          } catch (_) {}
          assistantEl.className = 'mos-chat-msg mos-chat-msg-system';
          assistantEl.textContent = errMsg;
          self._endStream();
        });
      }

      // Parse SSE stream
      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      function readChunk() {
        return reader.read().then(function(result) {
          if (result.done) {
            handleStreamEnd();
            return;
          }

          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line.startsWith('data: ')) continue;
            var jsonStr = line.slice(6);
            if (jsonStr === '[DONE]') continue;

            try {
              var event = JSON.parse(jsonStr);

              // Text content delta
              if (event.type === 'content_block_delta' && event.delta && event.delta.type === 'text_delta') {
                fullText += event.delta.text;
                assistantEl.innerHTML = renderMarkdown(fullText);
                self._scrollToBottom();
              }

              // Tool use content block start
              if (event.type === 'content_block_start' && event.content_block && event.content_block.type === 'tool_use') {
                currentToolUse = {
                  id: event.content_block.id,
                  name: event.content_block.name,
                  index: event.index
                };
                toolInputBuffer = '';
              }

              // Tool use input JSON delta
              if (event.type === 'content_block_delta' && event.delta && event.delta.type === 'input_json_delta') {
                toolInputBuffer += event.delta.partial_json;
              }

              // Content block stop -- finalize tool_use block
              if (event.type === 'content_block_stop' && currentToolUse) {
                var toolInput = {};
                try { toolInput = JSON.parse(toolInputBuffer); } catch (_) {}
                contentBlocks.push({
                  type: 'tool_use',
                  id: currentToolUse.id,
                  name: currentToolUse.name,
                  input: toolInput
                });
                currentToolUse = null;
                toolInputBuffer = '';
              }

              // Text content block stop
              if (event.type === 'content_block_stop' && !currentToolUse && fullText) {
                contentBlocks.push({ type: 'text', text: fullText });
              }

              // Message delta with stop_reason
              if (event.type === 'message_delta' && event.delta && event.delta.stop_reason) {
                stopReason = event.delta.stop_reason;
              }

              if (event.type === 'message_stop') {
                handleStreamEnd();
                return;
              }
            } catch (_) {
              // skip malformed JSON
            }
          }

          return readChunk();
        });
      }

      function handleStreamEnd() {
        if (stopReason === 'tool_use') {
          // Execute tool calls and send follow-up
          self._handleToolCalls(contentBlocks, messagesToSend, fullText, assistantEl);
        } else {
          self._finishMessage(fullText);
          self._endStream();
        }
      }

      return readChunk();
    }).catch(function(err) {
      assistantEl.className = 'mos-chat-msg mos-chat-msg-system';
      assistantEl.textContent = 'Connection error: ' + (err.message || 'unknown');
      self._endStream();
    });
  };

  ChatPanel.prototype._handleToolCalls = function(contentBlocks, previousMessages, textSoFar, assistantEl) {
    var self = this;

    // Build the assistant content blocks array
    var assistantContent = [];
    if (textSoFar) {
      assistantContent.push({ type: 'text', text: textSoFar });
    }

    // Execute each tool and collect results
    var toolResults = [];
    var toolContext = {
      graph: (typeof window !== 'undefined' && window.__mosGraph) || null,
      roomData: self._roomData,
      chatPanel: self
    };

    for (var i = 0; i < contentBlocks.length; i++) {
      var block = contentBlocks[i];
      if (block.type === 'tool_use') {
        assistantContent.push({
          type: 'tool_use',
          id: block.id,
          name: block.name,
          input: block.input
        });

        // Execute the tool
        var result = execTool(block.name, block.input, toolContext);

        // Also call onToolCall callback for backward compat
        if (self._onToolCall) {
          self._onToolCall(block.name, block.input);
        }

        // Render inline component if tool returned one
        if (result.rendered && result.component) {
          var componentHtml = renderToolComponent(result.component);
          if (componentHtml) {
            var cardEl = document.createElement('div');
            cardEl.className = 'mos-chat-msg mos-chat-msg-assistant';
            cardEl.style.maxWidth = '95%';
            cardEl.innerHTML = componentHtml;
            self._msgList.appendChild(cardEl);
            self._scrollToBottom();
          }
        }

        toolResults.push({
          type: 'tool_result',
          tool_use_id: block.id,
          content: JSON.stringify(result)
        });
      }
    }

    // Save the text part as assistant message
    if (textSoFar) {
      self._finishMessage(textSoFar);
    }

    // Build follow-up messages array
    var followUpMessages = previousMessages.slice();
    followUpMessages.push({ role: 'assistant', content: assistantContent });
    followUpMessages.push({ role: 'user', content: toolResults });

    // Store in conversation history for context
    self._messages.push({ role: 'assistant', content: textSoFar || '(tool call)' });

    // Cap at 20
    while (self._messages.length > 20) {
      self._messages.shift();
    }

    // Stream the follow-up response (Larry describes what it did)
    self._streamResponse(followUpMessages);
  };

  ChatPanel.prototype._finishMessage = function(text) {
    if (text) {
      this._messages.push({ role: 'assistant', content: text });
      // Cap at 20
      while (this._messages.length > 20) {
        this._messages.shift();
      }
    }
  };

  ChatPanel.prototype._endStream = function() {
    this._streaming = false;
    this._panel.classList.remove('mos-chat-streaming');
    if (this._sendBtn) this._sendBtn.disabled = false;
    if (this._textarea) this._textarea.focus();
  };

  ChatPanel.prototype.destroy = function() {
    this._destroyed = true;
    if (this._container) {
      this._container.innerHTML = '';
    }
  };

  return ChatPanel;

})();

// Module exports
if (typeof window !== 'undefined') window.ChatPanel = ChatPanel;
if (typeof module !== 'undefined') module.exports = ChatPanel;

</script>

<script>
(function() {
  var D = ROOM_DATA;
  var container = document.getElementById('graph-container');

  if (!container || !D.graph || typeof CanvasGraph !== 'function') {
    if (container) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">No graph data available</div>';
    }
    return;
  }

  // Initialize detail panel
  if (typeof GraphDetailPanel !== 'undefined') {
    GraphDetailPanel.init(document.body);
  }

  // Create full-viewport graph
  var graph = new CanvasGraph(container, D.graph, {
    onNodeClick: function(nodeData) {
      if (typeof GraphDetailPanel !== 'undefined') {
        var allEdges = (D.graph.elements && D.graph.elements.edges) || [];
        GraphDetailPanel.show(nodeData, allEdges);
      }
    }
  });

  // Expose graph for chat tool calls
  window.__mosGraph = graph;

  // Expose GenerativeTools globally for chat panel
  window.__mosTools = typeof GenerativeTools !== 'undefined' ? GenerativeTools : null;
})();

// -- Chat Panel initialization --
(function() {
  var D = ROOM_DATA;
  if (typeof ChatPanel === 'undefined') return;
  var chatContainer = document.createElement('div');
  chatContainer.id = 'chat-container';
  document.body.appendChild(chatContainer);
  var panel = new ChatPanel(chatContainer, {
    roomData: D,
    onToolCall: function(name, args) {
      if (typeof GenerativeTools !== 'undefined') {
        return GenerativeTools.executeToolCall(name, args, {
          graph: window.__mosGraph,
          roomData: D,
          chatPanel: panel
        });
      }
      // Fallback: direct highlightCluster for backward compat
      if (name === 'highlightCluster' && window.__mosGraph) {
        window.__mosGraph.highlightCluster(args.group);
        return { success: true };
      }
      return { success: false, message: 'Tool not available' };
    }
  });
  window.__mosChatPanel = panel;
})();

function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}
</script>
