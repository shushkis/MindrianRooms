<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" font-family="Arial, sans-serif" direction="rtl">
  <!-- Background -->
  <rect width="760" height="520" fill="#ffffff" rx="8"/>
  <rect x="1" y="1" width="758" height="518" fill="none" stroke="#2563EB" stroke-width="2" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="760" height="54" fill="#2563EB" rx="8"/>
  <rect x="0" y="30" width="760" height="24" fill="#2563EB"/>
  <text x="380" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="bold">הזדמנות 1 | Biomarker and Natural History Infrastructure</text>

  <!-- Chain Row -->
  <!-- Domain Box -->
  <rect x="570" y="80" width="160" height="60" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/>
  <text x="650" y="105" text-anchor="middle" fill="#1E40AF" font-size="11" font-weight="bold">תחום</text>
  <text x="650" y="122" text-anchor="middle" fill="#1D4ED8" font-size="10">CAMK2B Disorders</text>
  <text x="650" y="135" text-anchor="middle" fill="#1D4ED8" font-size="9">(~70 חולים, גילוי 2017)</text>

  <!-- Arrow 1 -->
  <line x1="570" y1="110" x2="530" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Method Box -->
  <rect x="300" y="80" width="220" height="60" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/>
  <text x="410" y="103" text-anchor="middle" fill="#1E40AF" font-size="11" font-weight="bold">מתודולוגיה</text>
  <text x="410" y="118" text-anchor="middle" fill="#1D4ED8" font-size="10">Reverse Salient Analysis</text>
  <text x="410" y="132" text-anchor="middle" fill="#1D4ED8" font-size="9">תת-מערכת: Natural History / Biomarkers</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="110" x2="260" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Opportunity Box -->
  <rect x="30" y="76" width="220" height="68" fill="#2563EB" stroke="#1E40AF" stroke-width="1.5" rx="6"/>
  <text x="140" y="99" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ההזדמנות</text>
  <text x="140" y="114" text-anchor="middle" fill="#BFDBFE" font-size="9.5">פלטפורמה לאיסוף נתוני</text>
  <text x="140" y="127" text-anchor="middle" fill="#BFDBFE" font-size="9.5">natural history ו-PRO</text>
  <text x="140" y="140" text-anchor="middle" fill="#BFDBFE" font-size="9.5">שתאפשר הגדרת trial endpoints</text>

  <!-- Down Arrow from chain -->
  <line x1="380" y1="148" x2="380" y2="175" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Problem Formulations Title -->
  <text x="380" y="195" text-anchor="middle" fill="#1E40AF" font-size="13" font-weight="bold">ניסוחי הבעיה</text>
  <line x1="80" y1="202" x2="680" y2="202" stroke="#BFDBFE" stroke-width="1"/>

  <!-- Un-Defined -->
  <rect x="490" y="215" width="230" height="120" fill="#F0F7FF" stroke="#93C5FD" stroke-width="1.5" rx="6"/>
  <rect x="490" y="215" width="230" height="28" fill="#BFDBFE" rx="6"/>
  <rect x="490" y="231" width="230" height="12" fill="#BFDBFE"/>
  <text x="605" y="233" text-anchor="middle" fill="#1E3A8A" font-size="11" font-weight="bold">Un-Defined</text>
  <text x="605" y="252" text-anchor="middle" fill="#1E40AF" font-size="9">(תחושת אי-נחת כללית)</text>
  <text x="605" y="268" text-anchor="middle" fill="#374151" font-size="9">יש הכרה בפגם הגנטי,</text>
  <text x="605" y="282" text-anchor="middle" fill="#374151" font-size="9">אבל אף אחד לא יודע</text>
  <text x="605" y="296" text-anchor="middle" fill="#374151" font-size="9">מה יקרה לילד שלך</text>
  <text x="605" y="310" text-anchor="middle" fill="#374151" font-size="9">עם הגיל.</text>
  <text x="605" y="327" text-anchor="middle" fill="#6B7280" font-size="8" font-style="italic">מקור: PMC11418780</text>

  <!-- Ill-Defined -->
  <rect x="265" y="215" width="210" height="120" fill="#F0F7FF" stroke="#93C5FD" stroke-width="1.5" rx="6"/>
  <rect x="265" y="215" width="210" height="28" fill="#93C5FD" rx="6"/>
  <rect x="265" y="231" width="210" height="12" fill="#93C5FD"/>
  <text x="370" y="233" text-anchor="middle" fill="#1E3A8A" font-size="11" font-weight="bold">Ill-Defined</text>
  <text x="370" y="252" text-anchor="middle" fill="#1E40AF" font-size="9">(מה כואב)</text>
  <text x="370" y="268" text-anchor="middle" fill="#374151" font-size="9">חסרים נתוני מעקב</text>
  <text x="370" y="282" text-anchor="middle" fill="#374151" font-size="9">ארוך-טווח שמאפשרים</text>
  <text x="370" y="296" text-anchor="middle" fill="#374151" font-size="9">לדעת מה הוא החמרה,</text>
  <text x="370" y="310" text-anchor="middle" fill="#374151" font-size="9">שיפור, או נקודת יעד.</text>
  <text x="370" y="327" text-anchor="middle" fill="#6B7280" font-size="8" font-style="italic">מקור: PMC11633687</text>

  <!-- Well-Defined -->
  <rect x="30" y="215" width="220" height="200" fill="#F0F7FF" stroke="#2563EB" stroke-width="1.5" rx="6"/>
  <rect x="30" y="215" width="220" height="28" fill="#2563EB" rx="6"/>
  <rect x="30" y="231" width="220" height="12" fill="#2563EB"/>
  <text x="140" y="233" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Well-Defined</text>
  <text x="140" y="252" text-anchor="middle" fill="#1E40AF" font-size="9">(ניסוח 1)</text>
  <text x="140" y="267" text-anchor="middle" fill="#374151" font-size="8.5">הורים ל-CAMK2B שרוצים</text>
  <text x="140" y="280" text-anchor="middle" fill="#374151" font-size="8.5">להשתתף במחקר אינם</text>
  <text x="140" y="293" text-anchor="middle" fill="#374151" font-size="8.5">יודעים אילו מדדים לדווח.</text>
  <line x1="50" y1="304" x2="230" y2="304" stroke="#BFDBFE" stroke-width="1"/>
  <text x="140" y="320" text-anchor="middle" fill="#1E40AF" font-size="9">(ניסוח 2)</text>
  <text x="140" y="334" text-anchor="middle" fill="#374151" font-size="8.5">חוקר שמתכנן trial</text>
  <text x="140" y="347" text-anchor="middle" fill="#374151" font-size="8.5">אינו יכול לבחור</text>
  <text x="140" y="360" text-anchor="middle" fill="#374151" font-size="8.5">primary endpoint.</text>
  <text x="140" y="378" text-anchor="middle" fill="#6B7280" font-size="8" font-style="italic">מקור: PMC11418780 + FDA Framework</text>
  <text x="140" y="391" text-anchor="middle" fill="#6B7280" font-size="8" font-style="italic">hhs.gov</text>
  <text x="140" y="407" text-anchor="middle" fill="#1D4ED8" font-size="8.5" font-weight="bold">מדד: 3+ ניסויים משתמשים</text>
  <text x="140" y="420" text-anchor="middle" fill="#1D4ED8" font-size="8.5" font-weight="bold">בפרוטוקול PRO מאומת</text>

  <!-- Footer -->
  <rect x="0" y="480" width="760" height="40" fill="#EFF6FF" rx="8"/>
  <rect x="0" y="480" width="760" height="12" fill="#EFF6FF"/>
  <text x="380" y="498" text-anchor="middle" fill="#1E40AF" font-size="9">IRIS Week 2 | CAMK2B Domain | Opportunity 1 of 3</text>
  <text x="380" y="512" text-anchor="middle" fill="#6B7280" font-size="8">Sources: PMC11418780 · PMC11633687 · ClinicalTrials NCT06314490 · HHS.gov FDA Framework</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563EB"/>
    </marker>
  </defs>
</svg>
